<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WolfVox™ | DevForms</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #060608;
            --header: #111113;
            --card-bg: #161618;
            --border: #2d2d30;
            --accent: #7a6cff;
            --text-main: #eeeeee;
            --text-dim: #a1a1aa;
            --render-green: #00d1b2;
            --error: #ff4d4d;
        }

        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        
        body { 
            background-color: var(--bg); 
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            color: var(--text-main); 
            margin: 0; 
        }

        /* Top Nav */
        nav {
            display: flex; align-items: center; gap: 20px;
            padding: 12px 30px; background: var(--header); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .search-container { flex: 1; max-width: 400px; position: relative; }
        .search-container input {
            width: 100%; background: #000; border: 1px solid var(--border);
            color: white; padding: 8px 12px 8px 35px; border-radius: 6px; font-size: 13px;
        }
        .search-container i { position: absolute; left: 12px; top: 11px; color: var(--text-dim); font-size: 12px; }

        /* User Profile Area */
        #userArea { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--accent); }
        .publish-btn {
            background: var(--accent); color: white; border: none; 
            padding: 6px 16px; border-radius: 6px; cursor: pointer; font-weight: 600;
        }
        .publish-btn:disabled { background: #333; cursor: not-allowed; opacity: 0.5; }

        /* Modals */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 3000;
        }
        .modal-content {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center;
        }
        .modal-content input {
            width: 100%; padding: 12px; margin: 10px 0; background: #000;
            border: 1px solid var(--border); color: white; border-radius: 6px;
        }
        .social-btn {
            width: 100%; padding: 12px; margin: 5px 0; border-radius: 6px; border: 1px solid var(--border);
            background: #fff; color: #000; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* Reusing previous styles for rows/footer */
        .sub-nav { display: flex; gap: 5px; padding: 10px 30px; background: var(--header); border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; min-height: 400px; }
        .form-row { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--card-bg); border: 1px solid var(--border); margin-bottom: -1px; cursor: pointer; }
        
        .sitemap-container { max-width: 1100px; margin: 80px auto 20px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 40px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .sitemap-col a { display: block; color: var(--accent); text-decoration: none; margin-bottom: 8px; font-size: 14px; }
        footer { text-align: center; padding: 40px; color: var(--text-dim); font-size: 12px; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="authModal" class="modal">
    <div class="modal-content">
        <h2 id="authTitle">Sign In</h2>
        <p style="color:var(--text-dim); font-size: 14px;">Connect with your preferred developer account</p>
        
        <button class="social-btn" onclick="socialLogin('GitHub')">
            <i class="fa-brands fa-github"></i> Continue with GitHub
        </button>
        <button class="social-btn" onclick="socialLogin('Google')">
            <i class="fa-brands fa-google"></i> Continue with Google
        </button>

        <div style="margin: 20px 0; color: var(--text-dim); font-size: 12px;">OR USE EMAIL</div>

        <input type="email" id="emailInput" placeholder="Email Address">
        <input type="password" id="passInput" placeholder="Password">
        <button class="publish-btn" style="width:100%; margin-top:10px;" onclick="handleEmailAuth()">Login / Sign Up</button>
        <p id="authError" style="color:var(--error); font-size:12px; margin-top:10px; display:none;">Invalid credentials</p>
        <button onclick="closeModal()" style="background:none; border:none; color:var(--text-dim); margin-top:15px; cursor:pointer;">Cancel</button>
    </div>
</div>

<nav>
    <h2 style="font-size: 18px; margin:0;">Wolf<span style="color:var(--accent)">Vox</span></h2>
    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Search or jump to..." onkeyup="if(event.key==='Enter') searchForms()">
    </div>
    <div id="userArea">
        <a href="javascript:void(0)" onclick="openModal()" style="color:white; text-decoration:none; font-size:14px;">Sign In</a>
        <button id="publishBtn" class="publish-btn" disabled title="Please login to publish">Publish</button>
    </div>
</nav>

<div class="sub-nav">
    <button style="background:transparent; border:none; color:white; padding:10px;" class="active"><i class="fa-solid fa-code"></i> Forms</button>
    <button style="background:transparent; border:none; color:var(--text-dim); padding:10px;"><i class="fa-solid fa-book"></i> Docs</button>
</div>

<div class="container">
    <div id="results"></div>
</div>

<div class="sitemap-container">
    <div class="sitemap-col"><h4>Product</h4><a href="#">Forms</a><a href="#">API</a></div>
    <div class="sitemap-col"><h4>Resources</h4><a href="#">Docs</a><a href="#">Support</a></div>
    <div class="sitemap-col"><h4>Community</h4><a href="#">Discord</a><a href="#">Twitter</a></div>
    <div class="sitemap-col"><h4>Legal</h4><a href="#">Terms</a><a href="#">Privacy</a></div>
</div>

<footer>&copy; 2026 WolfVox Technologies</footer>

<script>
const API = "https://backhand-forms.onrender.com/api/forms";
let currentUser = JSON.parse(localStorage.getItem('wv_user')) || null;

// UI Initialization
function initAuth() {
    const userArea = document.getElementById('userArea');
    const pubBtn = document.getElementById('publishBtn');

    if (currentUser) {
        userArea.innerHTML = `
            <span style="font-size:13px; color:var(--text-dim)">${currentUser.name}</span>
            <img src="${currentUser.avatar}" class="user-avatar">
            <button class="publish-btn" onclick="location.href='Create.html'">Publish</button>
            <a href="javascript:void(0)" onclick="logout()" style="color:var(--error); font-size:11px; text-decoration:none;">Logout</a>
        `;
        pubBtn.disabled = false;
        pubBtn.title = "Publish a new form";
    }
}

// Modal Handlers
function openModal() { document.getElementById('authModal').style.display = 'flex'; }
function closeModal() { document.getElementById('authModal').style.display = 'none'; }

// Simulation: Social Login
function socialLogin(provider) {
    const fakeUser = {
        name: `Dev_${provider}`,
        avatar: provider === 'GitHub' ? 'https://github.com/identicons/wolf.png' : 'https://ui-avatars.com/api/?name=Wolf+Vox',
        email: `dev@${provider.toLowerCase()}.com`
    };
    saveUser(fakeUser);
}

// Simulation: Email/Password Login & Sign-Up
function handleEmailAuth() {
    const email = document.getElementById('emailInput').value;
    const pass = document.getElementById('passInput').value;
    
    if (email && pass.length > 4) {
        const fakeUser = {
            name: email.split('@')[0],
            avatar: `https://ui-avatars.com/api/?name=${email}`,
            email: email
        };
        saveUser(fakeUser);
    } else {
        document.getElementById('authError').style.display = 'block';
    }
}

function saveUser(user) {
    localStorage.setItem('wv_user', JSON.stringify(user));
    currentUser = user;
    closeModal();
    initAuth();
    alert(`Welcome back, ${user.name}! Publishing is now unlocked.`);
}

function logout() {
    localStorage.removeItem('wv_user');
    location.reload();
}

async function searchForms(){
    const q = document.getElementById("searchInput").value;
    const results = document.getElementById("results");
    results.innerHTML = "<p style='text-align:center'>Connecting...</p>";
    try {
        const res = await fetch(API + "?q=" + encodeURIComponent(q));
        const data = await res.json();
        results.innerHTML = "";
        data.reverse().forEach(item => {
            results.innerHTML += `
            <div class="form-row">
                <div><span style="color:var(--accent); font-weight:600;">${item.title}</span></div>
                <div style="color:var(--text-dim); font-size:13px;"><i class="fa-solid fa-thumbs-up"></i> ${item.likes || 0}</div>
            </div>`;
        });
    } catch (e) { results.innerHTML = "<p>API Offline</p>"; }
}

// Run
initAuth();
searchForms();
</script>
</body>
</html>
