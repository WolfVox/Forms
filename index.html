<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WolfVox™ | DevForms</title>
    <link rel="icon" type="image/x-icon" href="https://github.com/WolfVox/wolfvox.github.io/blob/main/WolfVoxLogo.png?raw=true">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg: #060608;
            --header: #111113;
            --card-bg: #161618;
            --border: #2d2d30;
            --accent: #7a6cff;
            --text-main: #eeeeee;
            --text-dim: #a1a1aa;
            --error: #ff4d4d;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: all 0.15s ease; }
        body { background-color: var(--bg); background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 60px 60px; color: var(--text-main); margin: 0; }

        nav { display: flex; align-items: center; gap: 20px; padding: 12px 30px; background: var(--header); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .search-container { flex: 1; max-width: 400px; position: relative; }
        .search-container input { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 6px 12px 6px 35px; border-radius: 6px; font-size: 13px; }
        .search-container i { position: absolute; left: 12px; top: 9px; color: var(--text-dim); font-size: 12px; }

        .sub-nav { display: flex; gap: 5px; padding: 10px 30px; background: var(--header); border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        .sub-btn { background: transparent; border: none; color: var(--text-main); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .sub-btn:hover { background: var(--border); }
        .sub-btn.active { border-bottom: 2px solid #f78166; border-radius: 0; font-weight: 600; }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; min-height: 60vh; }
        .form-row { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--card-bg); border: 1px solid var(--border); margin-bottom: -1px; cursor: pointer; }
        .form-row:hover { background: #1c1c1f; border-color: var(--text-dim); z-index: 5; position: relative; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 3000; }
        .modal-content { background: var(--card-bg); border: 1px solid var(--border); padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; }
        .modal-content input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: white; border-radius: 6px; }

        .overlay { position: fixed; top: 0; right: -100%; width: 100%; max-width: 600px; height: 100%; background: var(--header); border-left: 1px solid var(--border); z-index: 2000; padding: 60px 40px; overflow-y: auto; }
        .overlay.active { right: 0; box-shadow: -20px 0 50px rgba(0,0,0,0.8); }
        .close-btn { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 24px; color: var(--text-dim); }

        .FeedBackBtn { border: 1px solid #fff; background: rgba(255,255,255,0.05); color: #fff; padding: 10px 20px; cursor: pointer; font-weight: 600; }
        .FeedBackBtn:hover { background: #fff; color: #000; }
        
        .img-preview { width: 100%; border-radius: 8px; margin: 20px 0; border: 1px solid var(--border); }
        .vote-disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
    </style>
</head>
<body>

<nav>
    <h2 style="font-size: 18px;">Wolf<span style="color:var(--accent)">Vox</span></h2>
    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Search forms..." onkeyup="if(event.key==='Enter') searchForms()">
    </div>
    <div style="flex-grow: 1;"></div>
    <div class="nav-links" id="navAuthArea">
        <a href="javascript:void(0)" onclick="openAuth()" style="color:white; text-decoration:none; font-size: 14px;">Sign In</a>
    </div>
</nav>

<div id="authModal" class="modal">
    <div class="modal-content">
        <h3>Sign In</h3>
        <div id="g_id_onload"
             data-client_id="116311894928-qararv9qqqhtjomb2nbljfbrgrho9uft.apps.googleusercontent.com"
             data-callback="handleGoogleLogin">
        </div>
        <div class="g_id_signin" data-type="standard"></div>

        <div style="margin:20px 0; font-size:12px; color:var(--text-dim);">OR EMAIL</div>
        <input type="email" id="emailInput" placeholder="Email Address">
        <input type="password" id="passInput" placeholder="Password">
        <p id="errorMsg" style="color:var(--error); font-size:11px; display:none;">Invalid credentials.</p>
        <button onclick="validateLogin()" style="width:100%; padding:10px; background:var(--accent); border:none; color:white; border-radius:6px; cursor:pointer; margin-top:10px;">Login</button>
        <button onclick="closeAuth()" style="background:none; border:none; color:var(--text-dim); margin-top:10px; cursor:pointer;">Cancel</button>
    </div>
</div>

<div class="sub-nav">
    <button class="sub-btn active" onclick="searchForms()"><i class="fa-solid fa-code"></i> Forms</button>
    <button class="sub-btn" onclick="location.href='Market'"><i class="fa-solid fa-shop"></i> Market</button>
</div>

<div class="container"><div id="results"></div></div>

<div id="detailOverlay" class="overlay">
    <div class="close-btn" onclick="closeDetail()">&times;</div>
    <div id="detailContent"></div>
</div>

<script>
const API = "https://backhand-forms.onrender.com/api/forms";
let currentData = [];
let user = JSON.parse(localStorage.getItem('wv_user')) || null;

// AUTH LOGIC
function openAuth() { document.getElementById('authModal').style.display='flex'; }
function closeAuth() { document.getElementById('authModal').style.display='none'; }

function handleGoogleLogin(response) {
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    loginUser(payload.name, payload.email, payload.picture);
}

function validateLogin() {
    const e = document.getElementById('emailInput').value;
    const p = document.getElementById('passInput').value;
    if(e && p.length > 4) { // Basic validation
        loginUser(e.split('@')[0], e, `https://ui-avatars.com/api/?name=${e}`);
    } else { document.getElementById('errorMsg').style.display = 'block'; }
}

function loginUser(name, email, img) {
    localStorage.setItem('wv_user', JSON.stringify({name, email, img}));
    location.reload();
}

function updateNav() {
    if(user) {
        document.getElementById('navAuthArea').innerHTML = `
            <div style="display:flex; align-items:center; gap:15px;">
                <img src="${user.img}" width="30" style="border-radius:50%; border:1px solid var(--accent)">
                <button onclick="window.location.href='Create'" class="FeedBackBtn">Publish</button>
                <a href="#" onclick="localStorage.removeItem('wv_user'); location.reload();" style="color:var(--error); font-size:11px; text-decoration:none;">Logout</a>
            </div>`;
    }
}

// DATA & DISPLAY
async function searchForms() {
    const q = document.getElementById("searchInput").value.toLowerCase();
    const results = document.getElementById("results");
    try {
        const res = await fetch(API);
        let data = await res.json();
        currentData = data.filter(i => i.title.toLowerCase().includes(q));
        
        results.innerHTML = "";
        currentData.reverse().forEach((item, index) => {
            results.innerHTML += `
            <div class="form-row" onclick="openDetail(${index})">
                <div>
                    <span style="color:var(--accent); font-weight:600;">${item.title}</span>
                    <div style="font-size:11px; color:var(--text-dim); margin-top:4px;">By ${item.authorEmail || 'Anonymous'}</div>
                </div>
                <div style="color:var(--text-dim); font-size:13px;"><i class="fa-solid fa-thumbs-up"></i> ${item.likes || 0}</div>
            </div>`;
        });
    } catch (e) { results.innerHTML = "Server Offline."; }
}

function openDetail(index) {
    const item = currentData[index];
    const liked = hasVoted(item.title, 'voted');
    const disliked = hasVoted(item.title, 'disliked');
    const reported = hasVoted(item.title, 'reported');
    
    // --- 1. AUTHOR VERIFICATION HEADER ---
    const authorHeader = `
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:20px; padding-bottom:15px; border-bottom:1px solid var(--border);">
            <img src="${item.authorImg || 'https://ui-avatars.com/api/?name=User'}" 
                 width="42" height="42" style="border-radius:50%; border:2px solid var(--accent); background:#000;">
            <div>
                <div style="font-size:14px; font-weight:600; color:white; display:flex; align-items:center; gap:5px;">
                    ${item.authorName || 'Anonymous User'} 
                    <i class="fa-solid fa-circle-check" style="color:var(--accent); font-size:11px;" title="Verified Creator"></i>
                </div>
                <div style="font-size:11px; color:var(--text-dim);">${item.authorEmail || 'unverified@wolfvox.io'}</div>
            </div>
        </div>
    `;

    // --- 2. YOUTUBE PLAYER LOGIC ---
    let videoHTML = "";
    if (item.video) {
        let vidId = "";
        if (item.video.includes("v=")) vidId = item.video.split("v=")[1].split("&")[0];
        else if (item.video.includes("youtu.be/")) vidId = item.video.split("youtu.be/")[1];
        
        if (vidId) {
            videoHTML = `<iframe width="100%" height="315" src="https://www.youtube.com/embed/${vidId}" 
                         frameborder="0" allowfullscreen style="border-radius:8px; margin-top:15px; border:1px solid var(--border);"></iframe>`;
        }
    }

    // --- 3. FILE DOWNLOAD BOX ---
    let fileHTML = item.file ? `
        <div style="margin-top:20px; padding:12px; background:#000; border:1px solid var(--border); border-radius:8px; display:flex; align-items:center; justify-content:space-between;">
            <div style="font-size:13px;"><i class="fa-solid fa-file-arrow-down" style="color:var(--accent)"></i> ${item.file.split('/').pop()}</div>
            <a href="${item.file}" target="_blank" style="color:var(--accent); text-decoration:none; font-weight:600; font-size:12px; border:1px solid var(--accent); padding:4px 8px; border-radius:4px;">Download</a>
        </div>` : "";

    // --- 4. EXTERNAL LINKS LOGIC ---
    let linksHTML = "";
    if (item.links && item.links.length > 0) {
        linksHTML = `<div style="margin-top:20px; display:flex; flex-wrap:wrap; gap:8px;">`;
        item.links.forEach(link => {
            if(link && link.trim() !== "") {
                linksHTML += `
                    <a href="${link.startsWith('http') ? link : 'https://' + link}" target="_blank" 
                       style="background:var(--header); border:1px solid var(--border); color:var(--text-main); 
                       padding:6px 12px; border-radius:20px; text-decoration:none; font-size:12px; display:flex; align-items:center; gap:6px;">
                        <i class="fa-solid fa-link" style="font-size:10px; color:var(--accent)"></i> 
                        ${link.replace('https://','').replace('http://','').split('/')[0]}
                    </a>`;
            }
        });
        linksHTML += `</div>`;
    }

    // --- 5. FULL RENDER ---
    document.getElementById("detailContent").innerHTML = `
        ${authorHeader}
        
        <h2 style="font-family: Arial, sans-serif; margin-bottom:5px; color:white;">${item.title}</h2>
        <div style="font-size:11px; color:var(--text-dim); margin-bottom:20px;">Published on ${item.date || 'Recent'}</div>

        <div style="background:var(--card-bg); border:1px solid var(--border); padding:20px; border-radius:8px;">
            <div style="font-family: Arial, sans-serif; line-height:1.6; color:#eee;">${item.content}</div>
            ${item.image ? `<img src="${item.image}" class="img-preview" style="max-width:100%; border-radius:8px; margin-top:15px; border:1px solid var(--border);">` : ""}
            ${videoHTML}
            ${fileHTML}
            ${linksHTML} 
        </div>
        
        <div style="margin-top:25px; display:flex; gap:10px;">
            <button class="sub-btn ${liked ? 'vote-disabled' : ''}" style="background:var(--border); flex:1; justify-content:center;" onclick="sendVote('${item.title}', 'like')">
                <i class="fa-solid fa-thumbs-up"></i> ${liked ? 'Liked' : 'Like'} (${item.likes || 0})
            </button>
            <button class="sub-btn ${disliked ? 'vote-disabled' : ''}" style="background:var(--border); flex:1; justify-content:center;" onclick="sendVote('${item.title}', 'dislike')">
                <i class="fa-solid fa-thumbs-down"></i> Dislike
            </button>
            <button class="sub-btn ${reported ? 'vote-disabled' : ''}" style="background:var(--border); flex:1; justify-content:center;" onclick="sendVote('${item.title}', 'report')">
                <i class="fa-solid fa-flag"></i> Report
            </button>
        </div>`;

    document.getElementById("detailOverlay").classList.add("active");
}

async function deleteForm(title) {
    if(!confirm("Delete this form?")) return;
    // Note: You will need to add a DELETE route to your Render backend to make this actually remove data.
    alert("Delete request sent for: " + title);
}

function closeDetail() { document.getElementById("detailOverlay").classList.remove("active"); }

updateNav();
searchForms();
</script>
</body>
</html>
