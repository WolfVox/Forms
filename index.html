<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WolfVox™ | DevForms</title>
    <link rel="icon" type="image/x-icon" href="https://github.com/WolfVox/wolfvox.github.io/blob/main/WolfVoxLogo.png?raw=true">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #060608;
            --header: #111113;
            --card-bg: #161618;
            --border: #2d2d30;
            --accent: #7a6cff;
            --text-main: #eeeeee;
            --text-dim: #a1a1aa;
            --render-green: #00d1b2;
            --error: #ff4d4d;
        }

        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; transition: all 0.15s ease; }
        
        body { 
            background-color: var(--bg); 
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            color: var(--text-main); 
            margin: 0; 
        }

        nav {
            display: flex; align-items: center; gap: 20px;
            padding: 12px 30px; background: var(--header); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .search-container { flex: 1; max-width: 400px; position: relative; }
        .search-container input {
            width: 100%; background: #000; border: 1px solid var(--border);
            color: white; padding: 6px 12px 6px 35px; border-radius: 6px; font-size: 13px;
        }
        .search-container i { position: absolute; left: 12px; top: 9px; color: var(--text-dim); font-size: 12px; }

        .sub-nav {
            display: flex; gap: 5px; padding: 10px 30px; 
            background: var(--header); border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }
        .sub-btn {
            background: transparent; border: none; color: var(--text-main);
            padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .sub-btn:hover { background: var(--border); }
        .sub-btn.active { border-bottom: 2px solid #f78166; border-radius: 0; font-weight: 600; }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; min-height: 60vh; }
        .form-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px; background: var(--card-bg); border: 1px solid var(--border);
            margin-bottom: -1px; cursor: pointer;
        }
        .form-row:first-child { border-radius: 6px 6px 0 0; }
        .form-row:last-child { border-radius: 0 0 6px 6px; margin-bottom: 50px; }
        .form-row:hover { background: #1c1c1f; border-color: var(--text-dim); z-index: 5; position: relative; }
        
        /* Modal & Auth Styles */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 3000; }
        .modal-content { background: var(--card-bg); border: 1px solid var(--border); padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; }
        .modal-content input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: white; border-radius: 6px; }
        .btn-google { width: 100%; padding: 12px; background: white; color: black; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .account-box { border: 1px solid var(--border); padding: 10px; border-radius: 8px; margin-top: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px; text-align: left; }
        .account-box:hover { background: var(--border); }

        .overlay {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 600px;
            height: 100%; background: var(--header); border-left: 1px solid var(--border);
            z-index: 2000; padding: 60px 40px; overflow-y: auto;
        }
        .overlay.active { right: 0; box-shadow: -20px 0 50px rgba(0,0,0,0.8); }
        .close-btn { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 24px; color: var(--text-dim); }

        .sitemap-container {
            max-width: 1100px; margin: 80px auto 20px;
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 40px; display: grid;
            grid-template-columns: repeat(4, 1fr); gap: 20px;
        }
        .sitemap-col a { display: block; color: var(--accent); text-decoration: none; margin-bottom: 8px; font-size: 14px; }
        footer { text-align: center; padding: 40px; color: var(--text-dim); font-size: 13px; border-top: 1px solid var(--border); }
        .img-preview { width: 100%; border-radius: 8px; margin: 20px 0; border: 1px solid var(--border); display: block; }
        .vote-disabled { opacity: 0.3; cursor: not-allowed !important; pointer-events: none; }
        footer{
            backgrounf :black;
        }
    </style>
</head>
<body>

<nav>
    <h2 style="font-size: 18px;">Wolf<span style="color:var(--accent)">Vox</span></h2>
    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Search or jump to..." onkeyup="if(event.key==='Enter') searchForms()">
    </div>
    <div style="flex-grow: 1;"></div>
    <div class="nav-links" id="navAuthArea" style="font-size: 14px; display: flex; gap: 15px; align-items: center;">
        <a href="javascript:void(0)" onclick="openAuth()" style="color:white; text-decoration:none;">Sign In</a>
        <button onclick="handlePublish()" style="background:var(--accent); color:white; border:none; padding:5px 12px; border-radius:6px; cursor:pointer;">Publish</button>
    </div>
</nav>

<div id="authModal" class="modal">
    <div class="modal-content" id="modalStage">
        <h3>Sign In</h3>
        <button class="btn-google" onclick="showGoogleAccounts()">
            <img src="https://www.google.com/favicon.ico" width="16"> Continue with Google
        </button>
        <div style="margin:15px 0; font-size:12px; color:var(--text-dim);">OR EMAIL</div>
        <input type="email" id="emailInput" placeholder="Gmail Address">
        <input type="password" id="passInput" placeholder="Password">
        <p id="errorMsg" style="color:var(--error); font-size:11px; display:none; margin:0;">Something is wrong. Please check credentials.</p>
        <button onclick="validateLogin()" style="width:100%; padding:10px; background:var(--accent); border:none; color:white; border-radius:6px; cursor:pointer; margin-top:10px;">Login</button>
        <button onclick="closeAuth()" style="background:none; border:none; color:var(--text-dim); margin-top:10px; cursor:pointer;">Cancel</button>
    </div>
</div>

<div class="sub-nav">
    <button class="sub-btn active" onclick="location.href='index'">
        <i class="fa-solid fa-code"></i> Forms
    </button>
    <button class="sub-btn" onclick="location.href='Market'">
        <i class="fa-solid fa-shop"></i> Marketplace
    </button>
    <button class="sub-btn" onclick="location.href='Docs'">
        <i class="fa-solid fa-book"></i> Docs
    </button>
    <button class="sub-btn" onclick="location.href='Insights'">
        <i class="fa-solid fa-chart-line"></i> Insights
    </button>
</div>

<div class="container">
    <div id="results"></div>
</div>

<div id="detailOverlay" class="overlay">
    <div class="close-btn" onclick="closeDetail()">&times;</div>
    <div id="detailContent"></div>
</div>

<div class="sitemap-container">
    <div class="sitemap-col"><h4>Product</h4><a href="#">Forms</a><a href="#">Analytics</a></div>
    <div class="sitemap-col"><h4>Resources</h4><a href="#">Docs</a><a href="#">Hub</a></div>
    <div class="sitemap-col"><h4>Community</h4><a href="#">Discord</a><a href="#">Twitter</a></div>
    <div class="sitemap-col"><h4>Legal</h4><a href="#">Privacy</a><a href="#">Terms</a></div>
</div>

<footer>&copy; 2026 WolfVoxCo | Community Forms.</footer>

<script>
const API = "https://backhand-forms.onrender.com/api/forms";
let currentData = [];
let user = JSON.parse(localStorage.getItem('wv_user')) || null;

// Interaction Checks
function hasVoted(title, type) { return localStorage.getItem(`${type}_${title}`); }

// Auth Functions
function openAuth() { document.getElementById('authModal').style.display='flex'; }
function closeAuth() { document.getElementById('authModal').style.display='none'; }

function validateLogin() {
    const e = document.getElementById('emailInput').value;
    const p = document.getElementById('passInput').value;
    if(e === "admin@wolfvox.com" && p === "12345") {
        loginUser("Admin", e, "https://ui-avatars.com/api/?name=Admin");
    } else { document.getElementById('errorMsg').style.display = 'block'; }
}

function showGoogleAccounts() {
    document.getElementById('modalStage').innerHTML = `
        <h3>Choose an account</h3>
        <div class="account-box" onclick="loginUser('Dev User', 'dev@gmail.com', 'https://ui-avatars.com/api/?name=Dev')">
            <img src="https://ui-avatars.com/api/?name=Dev" width="30" style="border-radius:50%">
            <div><div style="font-size:13px">Dev User</div><div style="font-size:11px; color:var(--text-dim)">dev@gmail.com</div></div>
        </div>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--accent); margin-top:15px; cursor:pointer;">Back</button>`;
}

function loginUser(name, email, img) {
    localStorage.setItem('wv_user', JSON.stringify({name, email, img}));
    location.reload();
}

function handlePublish() {
    if(!user) { openAuth(); } else { window.location.href = 'Create'; }
}

function updateNav() {
    if(user) {
        document.getElementById('navAuthArea').innerHTML = `
            <div style="display:flex; align-items:center; gap:10px;">
                <span style="font-size:12px;">${user.name}</span>
                <img src="${user.img}" width="24" style="border-radius:50%; border:1px solid var(--accent)">
            </div>
            <button onclick="handlePublish()" style="background:var(--accent); color:white; border:none; padding:5px 12px; border-radius:6px; cursor:pointer;">Publish</button>
            <a href="#" onclick="localStorage.removeItem('wv_user'); location.reload();" style="color:var(--error); text-decoration:none; font-size:11px;">Logout</a>`;
    }
}

// Data Handling
async function searchForms() {
    const q = document.getElementById("searchInput").value.toLowerCase().trim();
    const results = document.getElementById("results");
    
    results.innerHTML = "<div style='padding:40px; text-align:center;'>Searching WolfVox Database...</div>";

    try {
        // Fetch fresh data
        const res = await fetch(API);
        let data = await res.json();
        
        // 1. FILTER: Only show forms where the title or content includes the search text
        // If the search box is empty, it shows everything.
        const filteredData = data.filter(item => {
            const titleMatch = item.title && item.title.toLowerCase().includes(q);
            const contentMatch = item.content && item.content.toLowerCase().includes(q);
            return titleMatch || contentMatch;
        });

        results.innerHTML = "";

        if (filteredData.length === 0) {
            results.innerHTML = `
                <div style="padding:60px; text-align:center; color:var(--text-dim);">
                    <i class="fa-solid fa-magnifying-glass" style="font-size:30px; margin-bottom:15px; opacity:0.3;"></i>
                    <p>No forms found matching "<b>${q}</b>"</p>
                    <button onclick="document.getElementById('searchInput').value=''; searchForms();" 
                            style="background:none; border:1px solid var(--border); color:var(--accent); padding:8px 15px; border-radius:6px; cursor:pointer;">
                        Clear Search
                    </button>
                </div>`;
            return;
        }

        // 2. RENDER: Show filtered results (Reverse to show newest first)
        filteredData.reverse().forEach((item, index) => {
            // Find the original index for the openDetail function
            // We use item.title as a reference
            const originalIndex = data.indexOf(item);
            
            results.innerHTML += `
            <div class="form-row" onclick="openDetailFromData(${JSON.stringify(item).replace(/"/g, '&quot;')})">
                <div>
                    <span style="color:var(--accent); font-weight:600;">${item.title}</span>
                    <div style="font-size:12px; color:var(--text-dim); margin-top:4px;">
                        Published ${item.date || 'Recently'}
                    </div>
                </div>
                <div style="display:flex; gap:15px; color:var(--text-dim); font-size:13px;">
                    <span><i class="fa-solid fa-thumbs-up"></i> ${item.likes || 0}</span>
                </div>
            </div>`;
        });

        // Store current viewable data for the detail panel
        currentData = filteredData;

    } catch (e) {
        results.innerHTML = "<div style='color:coral; text-align:center; padding:40px;'>Search Offline. Check API connection.</div>";
    }
}

// Helper to open details for specific search results
function openDetailFromData(item) {
    // We update currentData to a single-item array so the existing detail logic works
    currentData = [item];
    openDetail(0);
    // Refresh full list in background so currentData is restored
    const q = document.getElementById("searchInput").value;
    if(!q) searchForms(); 
}

function openDetail(index) {
    const item = currentData[index];
    const liked = hasVoted(item.title, 'voted');
    const disliked = hasVoted(item.title, 'disliked');
    const reported = hasVoted(item.title, 'reported');
    
    // 1. YouTube Player Logic
    let videoHTML = "";
    if (item.video) {
        let vidId = "";
        if (item.video.includes("v=")) vidId = item.video.split("v=")[1].split("&")[0];
        else if (item.video.includes("youtu.be/")) vidId = item.video.split("youtu.be/")[1];
        
        if (vidId) {
            videoHTML = `<iframe width="100%" height="315" src="https://www.youtube.com/embed/${vidId}" 
                         frameborder="0" allowfullscreen style="border-radius:8px; margin-top:15px; border:1px solid var(--border);"></iframe>`;
        }
    }

    // 2. File Download Box
    let fileHTML = item.file ? `
        <div style="margin-top:20px; padding:12px; background:#000; border:1px solid var(--border); border-radius:8px; display:flex; align-items:center; justify-content:space-between;">
            <div style="font-size:13px;"><i class="fa-solid fa-file-arrow-down" style="color:var(--accent)"></i> ${item.file.split('/').pop()}</div>
            <a href="${item.file}" target="_blank" style="color:var(--accent); text-decoration:none; font-weight:600; font-size:12px;">Download Attachment</a>
        </div>` : "";

    // 3. EXTERNAL LINKS LOGIC (The Fix)
    let linksHTML = "";
    if (item.links && item.links.length > 0) {
        linksHTML = `<div style="margin-top:20px; display:flex; flex-wrap:wrap; gap:8px;">`;
        item.links.forEach(link => {
            if(link.trim() !== "") {
                linksHTML += `
                    <a href="${link.startsWith('http') ? link : 'https://' + link}" target="_blank" 
                       style="background:var(--header); border:1px solid var(--border); color:var(--text-main); 
                       padding:6px 12px; border-radius:20px; text-decoration:none; font-size:12px; display:flex; align-items:center; gap:6px;">
                        <i class="fa-solid fa-link" style="font-size:10px; color:var(--accent)"></i> 
                        ${link.replace('https://','').replace('http://','').split('/')[0]}
                    </a>`;
            }
        });
        linksHTML += `</div>`;
    }

    // 4. Render Everything
    document.getElementById("detailContent").innerHTML = `
        <h2 style="font-family: Arial, sans-serif; margin-bottom:5px;">${item.title}</h2>
        <div style="font-size:12px; color:var(--text-dim); margin-bottom:20px;">Shared via WolfVox Platform</div>

        <div style="background:var(--card-bg); border:1px solid var(--border); padding:20px; border-radius:8px;">
            <div style="font-family: Arial, sans-serif; line-height:1.6;">${item.content}</div>
            ${item.image ? `<img src="${item.image}" class="img-preview" style="max-width:100%; border-radius:8px; margin-top:15px;">` : ""}
            ${videoHTML}
            ${fileHTML}
            ${linksHTML} 
        </div>
        
        <div style="margin-top:25px; display:flex; gap:10px;">
            <button class="sub-btn ${liked ? 'vote-disabled' : ''}" style="background:var(--border);" onclick="sendVote('${item.title}', 'like')">
                <i class="fa-solid fa-thumbs-up"></i> ${liked ? 'Liked' : 'Like'} (${item.likes || 0})
            </button>
            <button class="sub-btn ${disliked ? 'vote-disabled' : ''}" style="background:var(--border);" onclick="sendVote('${item.title}', 'dislike')">
                <i class="fa-solid fa-thumbs-down"></i> Dislike
            </button>
            <button class="sub-btn ${reported ? 'vote-disabled' : ''}" style="background:var(--border);" onclick="sendVote('${item.title}', 'report')">
                <i class="fa-solid fa-flag"></i> Report
            </button>
        </div>`;
    document.getElementById("detailOverlay").classList.add("active");
}

async function sendVote(title, type) {
    // If disliking while liked, we remove the like first locally to simulate mutual exclusivity
    if(type === 'dislike' && hasVoted(title, 'voted')) {
        localStorage.removeItem(`voted_${title}`);
    }

    const res = await fetch(API + "/interact", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, type })
    });
    
    if ((await res.json()).success) {
        const key = type === 'like' ? 'voted' : type === 'dislike' ? 'disliked' : 'reported';
        localStorage.setItem(`${key}_${title}`, true);
        searchForms(); closeDetail();
    }
}

function closeDetail() { document.getElementById("detailOverlay").classList.remove("active"); }
updateNav();
searchForms();
</script>
</body>
</html>
