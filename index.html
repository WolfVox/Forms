<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WolfVox™ | Forms</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --g1: #7a6cff;
            --bg: #0a0a0c;
            --card: #161618;
            --border: #2d2d30;
            --text: #ffffff;
            --dim: #a1a1aa;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        body.light { --bg: #f4f4f7; --card: #fff; --border: #e1e1e8; --text: #000; }

        /* GRID BACKGROUND */
        .grid-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1; opacity: 0.3;
        }

        /* TOP NAV (GitHub Style) */
        nav {
            display: flex; align-items: center; padding: 10px 20px;
            background: rgba(17, 17, 19, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
        }
        .nav-search { background: #000; border: 1px solid var(--border); color: #fff; padding: 5px 12px; border-radius: 6px; width: 250px; font-size: 13px; }

        /* HERO (Original Design) */
        .hero { padding: 80px 20px; text-align: center; }
        .hero h1 { font-size: 3rem; margin-bottom: 10px; }
        .hero p { color: var(--dim); margin-bottom: 30px; }
        .main-search {
            max-width: 600px; margin: 0 auto; display: flex; gap: 10px;
            background: var(--card); padding: 10px; border-radius: 12px; border: 1px solid var(--border);
        }
        .main-search input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1.1rem; }
        .main-search button { background: var(--g1); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* MODALS */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-content {
            background: var(--card); border: 1px solid var(--border); padding: 40px;
            border-radius: 16px; width: 100%; max-width: 400px; text-align: center;
        }
        .social-row { 
            display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; 
        }
        .btn-social { 
            background: #fff; color: #000; border: none; padding: 12px; border-radius: 6px; 
            font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .input-group input { 
            width: 100%; padding: 12px; margin-bottom: 10px; background: #000; 
            border: 1px solid var(--border); color: #fff; border-radius: 6px; 
        }

        /* ACCOUNT SELECTOR (Render Style) */
        .account-item {
            display: flex; align-items: center; gap: 10px; padding: 10px;
            border: 1px solid var(--border); margin-bottom: 8px; border-radius: 8px; cursor: pointer;
        }
        .account-item:hover { background: var(--border); }

        /* RESULTS */
        .results { max-width: 900px; margin: 0 auto; padding: 20px; }
        .card { 
            background: var(--card); border: 1px solid var(--border); padding: 20px; 
            border-radius: 12px; margin-bottom: 20px;
        }

        /* SITEMAP BOX */
        .sitemap {
            max-width: 1000px; margin: 100px auto 20px; background: var(--card);
            border: 1px solid var(--border); border-radius: 15px; padding: 40px;
            display: grid; grid-template-columns: repeat(3, 1fr);
        }
        .sitemap h4 { color: var(--g1); text-transform: uppercase; font-size: 12px; }
        .sitemap a { display: block; color: var(--dim); text-decoration: none; margin-top: 10px; font-size: 14px; }

        .theme-switcher { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; }
        .theme-btn { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; }
    </style>
</head>
<body class="dark">
    <div class="grid-overlay"></div>

    <nav>
        <h2 style="font-size: 18px; margin-right: 20px;">Wolf<span style="color:var(--g1)">Vox™</span></h2>
        <input type="text" class="nav-search" placeholder="Search documentation...">
        <div style="flex:1"></div>
        <div id="nav-auth">
            <button onclick="openAuth()" style="background:transparent; color:white; border:none; cursor:pointer;">Sign In</button>
            <button onclick="checkPublish()" style="background:var(--g1); color:white; border:none; padding:8px 15px; border-radius:6px; margin-left:15px; cursor:pointer;">Publish</button>
        </div>
    </nav>

    <section class="hero">
        <h1>Search Submissions</h1>
        <p>Upload forms with images, videos, files & links</p>
        <div class="main-search">
            <input id="searchInput" placeholder="Search forms...">
            <button onclick="searchForms()"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
        </div>
        <div style="margin-top:20px;">
            <button class="theme-btn" style="background:transparent; border:none; color:var(--dim)" onclick="location.href='#results'">
                <i class="fa-solid fa-chevron-down"></i> Browse Marketplace
            </button>
        </div>
    </section>

    <div class="results" id="results"></div>

    <div id="authModal" class="modal">
        <div class="modal-content" id="modalStage">
            <h2>Sign In</h2>
            <div class="social-row">
                <button class="btn-social" onclick="showGoogleAccounts()">
                    <img src="https://www.google.com/favicon.ico" width="16"> Continue with Google
                </button>
                <button class="btn-social" style="background:#24292f; color:#fff;" onclick="simulateAuth('GitHub')">
                    <i class="fa-brands fa-github"></i> Continue with GitHub
                </button>
            </div>
            <div style="color:var(--dim); font-size:12px; margin:15px 0;">OR EMAIL</div>
            <div class="input-group">
                <input type="email" id="email" placeholder="Email (admin@wolfvox.com)">
                <input type="password" id="pass" placeholder="Password (12345)">
                <button onclick="validateLogin()" style="width:100%; padding:12px; background:var(--g1); border:none; color:white; border-radius:6px; cursor:pointer;">Login</button>
                <p id="errorMsg" style="color:red; font-size:12px; display:none; margin-top:10px;">Invalid email or password.</p>
            </div>
            <button onclick="closeAuth()" style="background:none; border:none; color:var(--dim); margin-top:20px; cursor:pointer;">Close</button>
        </div>
    </div>

    <div class="sitemap">
        <div>
            <h4>Resources</h4>
            <a href="#">Documentation</a>
            <a href="#">API Reference</a>
            <a href="#">Status</a>
        </div>
        <div>
            <h4>Connect</h4>
            <a href="#">Discord</a>
            <a href="#">GitHub</a>
            <a href="#">Twitter</a>
        </div>
        <div>
            <h4>WolfVox™</h4>
            <a href="#">About Us</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
        </div>
    </div>

    <footer style="text-align:center; padding:40px; color:var(--dim); font-size:13px;">
        &copy; 2026 WolfVox Technologies. Rendered with speed.
    </footer>

    <div class="theme-switcher">
        <button class="theme-btn" style="background:#7a6cff" onclick="setTheme('theme1')"></button>
        <button class="theme-btn" style="background:#00e0ff" onclick="setTheme('theme2')"></button>
        <button class="theme-btn" style="background:#fff; color:#000" onclick="toggleMode()">☀</button>
    </div>

<script>
const API = "https://backhand-forms.onrender.com/api/forms";
let user = JSON.parse(localStorage.getItem('user')) || null;

function openAuth() { document.getElementById('authModal').style.display='flex'; }
function closeAuth() { document.getElementById('authModal').style.display='none'; }

// 1. SIMULATE RENDER-STYLE GOOGLE SELECTOR
function showGoogleAccounts() {
    const stage = document.getElementById('modalStage');
    stage.innerHTML = `
        <h2>Choose an account</h2>
        <p style="font-size:13px; color:var(--dim)">to continue to WolfVox</p>
        <div class="account-item" onclick="simulateAuth('Google', 'user.dev@gmail.com')">
            <img src="https://ui-avatars.com/api/?name=Dev+User" width="30" style="border-radius:50%">
            <div align="left"><div style="font-size:14px">Dev User</div><div style="font-size:12px;color:var(--dim)">user.dev@gmail.com</div></div>
        </div>
        <div class="account-item" onclick="simulateAuth('Google', 'wolf.admin@gmail.com')">
            <img src="https://ui-avatars.com/api/?name=Wolf+Admin" width="30" style="border-radius:50%">
            <div align="left"><div style="font-size:14px">Wolf Admin</div><div style="font-size:12px;color:var(--dim)">wolf.admin@gmail.com</div></div>
        </div>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--g1); margin-top:10px; cursor:pointer;">Use another account</button>
    `;
}

// 2. VALIDATE EMAIL/PASS
function validateLogin() {
    const e = document.getElementById('email').value;
    const p = document.getElementById('pass').value;
    
    // Real logic simulation
    if(e === "admin@wolfvox.com" && p === "12345") {
        simulateAuth('Email', e);
    } else {
        document.getElementById('errorMsg').style.display = 'block';
    }
}

function simulateAuth(type, emailValue) {
    const userData = {
        name: type === 'Email' ? 'Admin' : 'Developer',
        email: emailValue || 'github.user@dev.com',
        avatar: `https://ui-avatars.com/api/?name=${type}`
    };
    localStorage.setItem('user', JSON.stringify(userData));
    location.reload();
}

function checkPublish() {
    if(!user) {
        alert("Authentication Required: Please sign in with your Gmail to publish.");
        openAuth();
    } else {
        alert("Redirecting to Creator Studio...");
        // window.location.href = 'Create.html';
    }
}

function updateUI() {
    if(user) {
        document.getElementById('nav-auth').innerHTML = `
            <img src="${user.avatar}" width="30" style="border-radius:50%; border:2px solid var(--g1)">
            <span style="margin-left:10px; font-size:14px;">${user.name}</span>
            <button onclick="localStorage.clear(); location.reload();" style="color:red; background:none; border:none; cursor:pointer; font-size:12px;">Logout</button>
        `;
    }
}

// ORIGINAL SEARCH LOGIC
async function searchForms() {
    const results = document.getElementById("results");
    results.innerHTML = "<p style='text-align:center'>Connecting to API...</p>";
    try {
        const res = await fetch(API);
        const data = await res.json();
        results.innerHTML = "";
        data.reverse().forEach(item => {
            results.innerHTML += `
                <div class="card">
                    <h3>${item.title}</h3>
                    <p>${item.content}</p>
                    ${item.image ? `<img src="${item.image}" style="width:100%; border-radius:8px; margin-top:10px;">` : ""}
                </div>`;
        });
    } catch (e) { results.innerHTML = "<p>Server sleeping...</p>"; }
}

function toggleMode() { document.body.classList.toggle('light'); }
updateUI();
searchForms();
</script>
</body>
</html>
