<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WolfVox™ | DevForms</title>
    <link rel="icon" type="image/x-icon" href="https://github.com/WolfVox/wolfvox.github.io/blob/main/WolfVoxLogo.png?raw=true">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root {
            --bg: #060608;
            --header: #111113;
            --card-bg: #161618;
            --border: #2d2d30;
            --accent: #7a6cff;
            --text-main: #eeeeee;
            --text-dim: #a1a1aa;
            --render-green: #00d1b2;
            --error: #ff4d4d;
        }

        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; transition: all 0.15s ease; }
        
        body { 
            background-color: var(--bg); 
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            color: var(--text-main); 
            margin: 0; 
        }

        nav {
            display: flex; align-items: center; gap: 20px;
            padding: 12px 30px; background: var(--header); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .search-container { flex: 1; max-width: 400px; position: relative; }
        .search-container input {
            width: 100%; background: #000; border: 1px solid var(--border);
            color: white; padding: 6px 12px 6px 35px; border-radius: 6px; font-size: 13px;
        }
        .search-container i { position: absolute; left: 12px; top: 9px; color: var(--text-dim); font-size: 12px; }

        .sub-nav {
            display: flex; gap: 5px; padding: 10px 30px; 
            background: var(--header); border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }
        .sub-btn {
            background: transparent; border: none; color: var(--text-main);
            padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .sub-btn:hover { background: var(--border); }
        .sub-btn.active { border-bottom: 2px solid #f78166; border-radius: 0; font-weight: 600; }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; min-height: 60vh; }
        .form-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px; background: var(--card-bg); border: 1px solid var(--border);
            margin-bottom: -1px; cursor: pointer;
        }
        .form-row:first-child { border-radius: 6px 6px 0 0; }
        .form-row:last-child { border-radius: 0 0 6px 6px; margin-bottom: 50px; }
        .form-row:hover { background: #1c1c1f; border-color: var(--text-dim); z-index: 5; position: relative; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 3000; }
        .modal-content { background: var(--card-bg); border: 1px solid var(--border); padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; }
        .modal-content input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: white; border-radius: 6px; }
        
        .overlay {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 600px;
            height: 100%; background: var(--header); border-left: 1px solid var(--border);
            z-index: 2000; padding: 60px 40px; overflow-y: auto;
        }
        .overlay.active { right: 0; box-shadow: -20px 0 50px rgba(0,0,0,0.8); }
        .close-btn { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 24px; color: var(--text-dim); }

        .sitemap-container {
            max-width: 1100px; margin: 80px auto 20px;
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 40px; display: flex;
            justify-content: space-evenly; align-items: center;
        }
        .sitemap-col a { display: block; color: var(--accent); text-decoration: none; margin-bottom: 8px; font-size: 14px; }
        
        footer { text-align: center; padding: 40px; color: var(--text-dim); font-size: 13px; background-color: #0f0f0f ; border-top: 1px solid var(--border); }
        .img-preview { width: 100%; border-radius: 8px; margin: 20px 0; border: 1px solid var(--border); display: block; }
        .vote-disabled { opacity: 0.3; cursor: not-allowed !important; pointer-events: none; }

        .FeedBackBtn {
            position:relative; overflow:hidden; border-radius:0px; border:1px solid rgb(255, 255, 255);
            background:rgba(0, 0, 0, 0.02); color:white; font-weight:600; letter-spacing:0.4px;
            backdrop-filter:blur(6px); transition:all .25s cubic-bezier(.4,0,.2,1);
            box-shadow:0 4px 18px rgba(0,0,0,0.25); padding:15px; flex:1; height:100%;
        }
        .FeedBackBtn::before {
            content:""; position:absolute; inset:0; background:#ffffff; transform:scaleX(0);
            transform-origin:right; transition:transform .35s cubic-bezier(.65,0,.35,1); z-index:-1;
        }
        .FeedBackBtn:hover::before { transform-origin:left; transform:scaleX(1); }
        .FeedBackBtn:hover { color:#000; border-color:#ffffff; }
    </style>
</head>
<body>

<nav>
    <h2 style="font-size: 18px; margin:0;">Wolf<span style="color:var(--accent)">Vox</span></h2>
    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Search or jump to..." onkeyup="if(event.key==='Enter') searchForms()">
    </div>
    <div style="flex-grow: 1;"></div>
    <div class="nav-links" id="navAuthArea" style="font-size: 14px; display: flex; gap: 15px; align-items: center;">
        <a href="javascript:void(0)" onclick="openAuth()" style="color:white; text-decoration:none;">Sign In</a>
        <button onclick="handlePublish()" class="FeedBackBtn">Publish</button>
    </div>
</nav>

<div id="authModal" class="modal">
    <div class="modal-content">
        <h3>Sign In</h3>
        <div id="g_id_onload"
             data-client_id="116311894928-qararv9qqqhtjomb2nbljfbrgrho9uft.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleGoogleLogin"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_black" data-text="continue_with" data-size="large" data-logo_alignment="left" style="display: flex; justify-content: center;"></div>
        
        <div style="margin:20px 0; font-size:12px; color:var(--text-dim);">OR EMAIL (DECORATION)</div>
        <input type="email" placeholder="Email Address" disabled>
        <input type="password" placeholder="Password" disabled>
        <button onclick="closeAuth()" style="background:none; border:none; color:var(--text-dim); margin-top:10px; cursor:pointer;">Cancel</button>
    </div>
</div>

<div class="sub-nav">
    <button class="sub-btn active" onclick="location.href='index.html'"><i class="fa-solid fa-code"></i> Forms</button>
    <button class="sub-btn" onclick="location.href='Market'"><i class="fa-solid fa-shop"></i> Marketplace</button>
    <button class="sub-btn" onclick="location.href='Docs'"><i class="fa-solid fa-book"></i> Docs</button>
    <button class="sub-btn" onclick="location.href='Insights'"><i class="fa-solid fa-chart-line"></i> Insights</button>
</div>

<div class="container">
    <div id="results"></div>
</div>

<div id="detailOverlay" class="overlay">
    <div class="close-btn" onclick="closeDetail()">&times;</div>
    <div id="detailContent"></div>
</div>

<div class="sitemap-container">
    <div class="sitemap-col"><h4>Product</h4><a href="#">Forms</a><a href="#">Analytics</a></div>
    <div class="sitemap-col"><h4>Resources</h4><a href="#">Docs</a><a href="#">Hub</a></div>
    <div class="sitemap-col"><h4>Community</h4><a href="#">Discord</a><a href="#">Twitter</a></div>
    <div class="sitemap-col"><h4>Legal</h4><a href="#">Privacy</a><a href="#">Terms</a></div>
</div>

<footer>&copy; 2026 WolfVoxCo | Community Forms.</footer>

<script>
const API = "https://backhand-forms.onrender.com/api/forms";
let currentData = [];
let user = JSON.parse(localStorage.getItem('wv_user')) || null;

const ADMIN_EMAIL = "wolfvoxco@gmail.com";

function hasVoted(title, type) { return localStorage.getItem(`${type}_${title}`); }
function openAuth() { document.getElementById('authModal').style.display='flex'; }
function closeAuth() { document.getElementById('authModal').style.display='none'; }

function handleGoogleLogin(response) {
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    loginUser(payload.name, payload.email, payload.picture);
}

function loginUser(name, email, img) {
    localStorage.setItem('wv_user', JSON.stringify({name, email, img}));
    location.reload();
}

function handlePublish() {
    if(!user) { openAuth(); } else { window.location.href = 'Create.html'; }
}

function updateNav() {
    if(user) {
        document.getElementById('navAuthArea').innerHTML = `
            <div style="display:flex; align-items:center; gap:10px; background:var(--card-bg); padding:5px 10px; border-radius:20px; border:1px solid var(--border);">
                <span style="font-size:12px;">${user.name}</span>
                <img src="${user.img}" width="24" height="24" style="border-radius:50%; border:1px solid var(--accent); object-fit:cover;">
            </div>
            <button onclick="handlePublish()" class="FeedBackBtn" style="height:35px; padding:0 15px;">Publish</button>
            <a href="#" onclick="localStorage.removeItem('wv_user'); location.reload();" style="color:var(--error); text-decoration:none; font-size:11px;">Logout</a>`;
    }
}

async function searchForms() {
    const q = document.getElementById("searchInput").value.toLowerCase().trim();
    const results = document.getElementById("results");
    results.innerHTML = "<div style='padding:40px; text-align:center;'>Searching WolfVox Database...</div>";

    try {
        const res = await fetch(API);
        let data = await res.json();
        const filteredData = data.filter(item => (item.title?.toLowerCase().includes(q) || item.content?.toLowerCase().includes(q)));

        results.innerHTML = "";
        filteredData.reverse().forEach((item) => {
            const authorImg = item.authorImg || `https://ui-avatars.com/api/?name=${item.authorName || '?'}`;
            const isVerified = item.authorEmail === ADMIN_EMAIL;

            results.innerHTML += `
            <div class="form-row" onclick="openDetailFromData(${JSON.stringify(item).replace(/"/g, '&quot;')})">
                <div>
                    <span style="color:var(--accent); font-weight:600;">${item.title}</span>
                    <div style="display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-dim); margin-top: 4px;">
                        <img src="${authorImg}" width="16" height="16" style="border-radius:50%; border:1px solid var(--border);">
                        <span>by ${item.authorName || 'Anonymous'} ${isVerified ? '<i class="fa-solid fa-circle-check" style="color:var(--render-green); font-size:10px;"></i>' : ''}</span>
                    </div>
                </div>
                <div style="display:flex; gap:15px; color:var(--text-dim); font-size:13px;">
                    <span><i class="fa-solid fa-thumbs-up"></i> ${item.likes || 0}</span>
                </div>
            </div>`;
        });
        currentData = filteredData;
    } catch (e) { results.innerHTML = "<div style='color:coral; text-align:center; padding:40px;'>Search Offline.</div>"; }
}

function openDetailFromData(item) { currentData = [item]; openDetail(0); }

function openDetail(index) {
    const item = currentData[index];
    const liked = hasVoted(item.title, 'voted');
    const disliked = hasVoted(item.title, 'disliked');
    const reported = hasVoted(item.title, 'reported');
    
    const isVerified = item.authorEmail === ADMIN_EMAIL;
    const isCurrentUserAdmin = user && user.email === ADMIN_EMAIL;

    let mediaHTML = "";
    if (item.video) {
        let vidId = item.video.includes("v=") ? item.video.split("v=")[1].split("&")[0] : item.video.split("youtu.be/")[1];
        if (vidId) mediaHTML += `<iframe width="100%" height="315" src="https://www.youtube.com/embed/${vidId}" frameborder="0" allowfullscreen style="border-radius:8px; margin-top:15px; border:1px solid var(--border);"></iframe>`;
    }

    document.getElementById("detailContent").innerHTML = `
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:20px; padding-bottom:15px; border-bottom:1px solid var(--border);">
            <img src="${item.authorImg || 'https://ui-avatars.com/api/?name=?'}" width="40" height="40" style="border-radius:50%; border:1px solid var(--accent); object-fit:cover;">
            <div>
                <div style="font-size:14px; font-weight:700; color:white; display:flex; align-items:center;">
                    ${item.authorName || 'Anonymous'} ${isVerified ? '<i class="fa-solid fa-circle-check" style="color:var(--render-green); margin-left:5px;"></i>' : ''}
                </div>
                <div style="font-size:11px; color:var(--text-dim);">${item.authorEmail || 'Public Contributor'}</div>
            </div>
        </div>
        <h2 style="margin-bottom:5px;">${item.title}</h2>
        <div style="background:var(--card-bg); border:1px solid var(--border); padding:20px; border-radius:8px;">
            <div style="line-height:1.6;">${item.content}</div>
            ${item.image ? `<img src="${item.image}" class="img-preview">` : ""}
            ${mediaHTML}
        </div>
        <div style="margin-top:25px; display:flex; gap:10px;">
            <button class="sub-btn ${liked ? 'vote-disabled' : ''}" style="background:var(--border);" onclick="sendVote('${item.title}', 'like')">
                <i class="fa-solid fa-thumbs-up"></i> ${liked ? 'Liked' : 'Like'} (${item.likes || 0})
            </button>
            <button class="sub-btn ${disliked ? 'vote-disabled' : ''}" style="background:var(--border);" onclick="sendVote('${item.title}', 'dislike')">
                <i class="fa-solid fa-thumbs-down"></i> Dislike
            </button>
            <button class="sub-btn ${reported ? 'vote-disabled' : ''}" style="background:var(--border);" onclick="sendVote('${item.title}', 'report')">
                <i class="fa-solid fa-flag"></i> Report
            </button>
        </div>
        ${isCurrentUserAdmin ? `<button class="sub-btn" style="background:#2a0000; color:var(--error); border:1px solid var(--error); margin-top:20px; width:100%; justify-content:center;" onclick="adminNuke('${item.title}')"><i class="fa-solid fa-radiation"></i> REMOVE FORM (Admin Nuke)</button>` : ""}`;
    document.getElementById("detailOverlay").classList.add("active");
}

async function adminNuke(title) {

    if (!confirm("Are you sure you want to remove this form?")) return;

    for (let i = 0; i < 25; i++) {
        await sendVote(title, "report");

        // small delay so the backend counts them
        await new Promise(r => setTimeout(r, 80));
    }

    alert("Form removal sequence finished.");
    searchForms();
}

async function sendVote(title, type) {
    if(type === 'dislike' && hasVoted(title, 'voted')) { localStorage.removeItem(`voted_${title}`); }
    const res = await fetch(API + "/interact", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ title, type }) });
    if ((await res.json()).success) { 
        localStorage.setItem(`${type==='like'?'voted':type==='dislike'?'disliked':'reported'}_${title}`, true); 
        searchForms(); closeDetail(); 
    }
}

function closeDetail() { document.getElementById("detailOverlay").classList.remove("active"); }

updateNav();
searchForms();
</script>
</body>
</html>
