<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="https://github.com/WolfVox/wolfvox.github.io/blob/main/WolfVoxLogo.png?raw=true">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WolfVox™ | Create Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #060608;
            --header: #111113;
            --card-bg: #161618;
            --border: #2d2d30;
            --accent: #7a6cff;
            --text-main: #eeeeee;
            --text-dim: #a1a1aa;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: all 0.1s ease; }
        body { 
            background-color: var(--bg); 
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            color: var(--text-main); margin: 0; padding-bottom: 100px;
        }

        nav { padding: 12px 30px; background: var(--header); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top:0; z-index: 1000;}

        .publish-container { max-width: 800px; margin: 40px auto; padding: 40px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; }

        .input-group { margin-bottom: 25px; }
        label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }

        input, textarea {
            width: 100%; background: #000; border: 1px solid var(--border);
            color: white; padding: 12px; border-radius: 6px; font-size: 14px; margin-bottom: 10px;
        }
        input:focus { border-color: var(--accent); outline: none; }

        /* TOOLBAR HIGHLIGHTING */
        .toolbar {
            display: flex; gap: 8px; background: var(--header); 
            padding: 10px; border: 1px solid var(--border); 
            border-bottom: none; border-radius: 6px 6px 0 0;
        }
        .tool-btn {
            background: transparent; border: 1px solid transparent; 
            color: white; cursor: pointer; padding: 8px 12px; border-radius: 6px;
        }
        .tool-btn.active-tool { 
            background: rgba(122, 108, 255, 0.15); 
            border: 1px solid var(--accent) !important; 
            color: var(--accent);
            box-shadow: 0 0 10px rgba(122, 108, 255, 0.2);
        }
        
        #editor {
            min-height: 200px; padding: 15px; background: #000;
            border: 1px solid var(--border); border-radius: 0 0 6px 6px;
            outline: none; line-height: 1.6; color: #fff; overflow-y: auto;
        }

        /* PLUS BUTTONS (MARKETPLACE) */
        .plus-btn {
            background: transparent; border: 1px dashed var(--border);
            color: var(--accent); padding: 8px; border-radius: 6px;
            cursor: pointer; width: 100%; margin-bottom: 15px; font-size: 12px; font-weight: bold;
        }

        #chromaPalette { display: none; gap: 8px; padding: 12px; background: var(--header); border: 1px solid var(--border); border-top: none; }
        .color-box { width: 22px; height: 22px; border-radius: 4px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }

        .submit-btn {
            width: 100%; background: var(--accent); color: white;
            border: none; padding: 18px; border-radius: 6px;
            font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

<nav>
    <h2 onclick="location.href='index.html'" style="cursor:pointer">Wolf<span style="color:var(--accent)">Vox</span></h2>
    <a href="/Forms" style="color:var(--text-dim); text-decoration:none;">Dashboard</a>
</nav>

<section class="publish-container">
    <h1 style="text-align:center; margin-bottom:30px;">Create New Form</h1>

    <div class="input-group">
        <label>Form Title</label>
        <input id="title" placeholder="Enter title...">
    </div>

    <div class="input-group">
        <label>Description</label>
        <div class="toolbar">
            <button id="btn-bold" class="tool-btn" onclick="execCmd('bold')"><i class="fa-solid fa-bold"></i></button>
            <button id="btn-italic" class="tool-btn" onclick="execCmd('italic')"><i class="fa-solid fa-italic"></i></button>
            <button id="btn-arial" class="tool-btn" onclick="execCmd('fontName', 'Arial')">Arial</button>
            <button id="btn-palette" class="tool-btn" onclick="toggleChroma()"><i class="fa-solid fa-palette"></i></button>
            <button class="tool-btn" onclick="execCmd('removeFormat')"><i class="fa-solid fa-eraser"></i></button>
        </div>
        <div id="chromaPalette">
            <div class="color-box" style="background:#ff4d4d" onclick="execCmd('foreColor', '#ff4d4d')"></div>
            <div class="color-box" style="background:#4dff4d" onclick="execCmd('foreColor', '#4dff4d')"></div>
            <div class="color-box" style="background:#00e0ff" onclick="execCmd('foreColor', '#00e0ff')"></div>
            <div class="color-box" style="background:#ffff4d" onclick="execCmd('foreColor', '#ffff4d')"></div>
            <div class="color-box" style="background:#7a6cff" onclick="execCmd('foreColor', '#7a6cff')"></div>
            <div class="color-box" style="background:#ffffff" onclick="execCmd('foreColor', '#ffffff')"></div>
        </div>
        <div id="editor" contenteditable="true" onkeyup="updateToolbar()" onclick="updateToolbar()"></div>
    </div>

    <div class="input-group">
        <label>Image URL</label>
        <div id="imgSection"><input name="image" placeholder="Primary Image Link"></div>
        <button class="plus-btn" onclick="addField('imgSection')">+ Add More Images</button>

        <label>Video Link</label>
        <div id="vidSection"><input name="video" placeholder="YouTube or MP4 Link"></div>
        <button class="plus-btn" onclick="addField('vidSection')">+ Add More Videos</button>

        <label>File Download URL</label>
        <input id="file" placeholder="Zip/File Link">

        <label>External Links</label>
        <div id="linkSection"><input name="links" placeholder="Useful Links"></div>
        <button class="plus-btn" onclick="addField('linkSection')">+ Add More Links</button>
    </div>

    <button class="submit-btn" onclick="submitForm()">
        <i class="fa-solid fa-upload"></i> Publish Form
    </button>
</section>

<script>
    const API = "https://backhand-forms.onrender.com/api/forms";
    const hasChroma = localStorage.getItem('wv_plugin_chroma') === 'unlocked';
    const hasExpansion = localStorage.getItem('wv_plugin_expansion') === 'unlocked';

    // Highlight active tools (Bold/Italic/Arial)
    function updateToolbar() {
        document.getElementById('btn-bold').classList.toggle('active-tool', document.queryCommandState('bold'));
        document.getElementById('btn-italic').classList.toggle('active-tool', document.queryCommandState('italic'));
        const font = document.queryCommandValue('fontName');
        document.getElementById('btn-arial').classList.toggle('active-tool', font.includes('Arial'));
        
        const color = document.queryCommandValue('foreColor');
        const isColored = color && color !== 'rgb(238, 238, 238)' && color !== 'white';
        document.getElementById('btn-palette').classList.toggle('active-tool', isColored);
    }

    function execCmd(command, value = null) {
        document.getElementById('editor').focus();
        document.execCommand(command, false, value);
        updateToolbar();
    }

    function toggleChroma() {
        if(hasChroma) {
            const p = document.getElementById('chromaPalette');
            p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
        } else {
            execCmd('foreColor', '#7a6cff');
        }
    }

    function addField(id) {
        if(hasExpansion) {
            const container = document.getElementById(id);
            const input = document.createElement('input');
            input.placeholder = "Another Link...";
            container.appendChild(input);
        } else {
            alert("🔒 Feature Locked! Visit Marketplace for the Expansion Pack.");
            window.location.href = "Market.html";
        }
    }

    async function submitForm() {
        const title = document.getElementById('title').value;
        const content = document.getElementById('editor').innerHTML;
        const file = document.getElementById('file').value;

        if(!title || content === "") return alert("Please fill title and description.");

        const images = Array.from(document.querySelectorAll('#imgSection input')).map(i => i.value).filter(v => v);
        const videos = Array.from(document.querySelectorAll('#vidSection input')).map(i => i.value).filter(v => v);
        const linksArr = Array.from(document.querySelectorAll('#linkSection input')).map(i => i.value).filter(v => v);

        try {
            await fetch(API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    title, content, 
                    image: images[0] || "", images,
                    video: videos[0] || "", videos,
                    file, links: linksArr,
                    date: new Date().toLocaleDateString() 
                })
            });
            alert("Published!");
            window.location.href = "index.html";
        } catch (e) {
            alert("API Error.");
        }
    }
</script>
</body>
</html>
