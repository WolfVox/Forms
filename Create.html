<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WolfVox™ | Create Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #060608;
            --header: #111113;
            --card-bg: #161618;
            --border: #2d2d30;
            --accent: #7a6cff;
            --text-main: #eeeeee;
            --text-dim: #a1a1aa;
        }

        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; transition: all 0.1s ease; }
        
        body { 
            background-color: var(--bg); 
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            color: var(--text-main); 
            margin: 0; padding-bottom: 100px;
        }

        nav {
            display: flex; align-items: center; gap: 20px;
            padding: 12px 30px; background: var(--header); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }

        .publish-container { max-width: 800px; margin: 60px auto; padding: 40px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; }

        h1 { font-size: 24px; margin-bottom: 10px; text-align: center; }
        p { color: var(--text-dim); text-align: center; margin-bottom: 30px; font-size: 14px; }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }

        input, .editor-container {
            width: 100%; background: #000; border: 1px solid var(--border);
            color: white; padding: 12px; border-radius: 6px; font-size: 14px;
        }

        input:focus, .editor-container:focus-within { border-color: var(--accent); outline: none; }

        /* Rich Text Toolbar */
        .toolbar {
            display: flex; gap: 10px; background: var(--header); 
            padding: 8px; border: 1px solid var(--border); 
            border-bottom: none; border-radius: 6px 6px 0 0;
        }
        .tool-btn {
            background: transparent; border: 1px solid transparent; 
            color: white; cursor: pointer; padding: 5px 10px; border-radius: 4px;
        }
        .tool-btn:hover { background: var(--border); }
        
        #editor {
            min-height: 200px; padding: 15px; background: #000;
            border: 1px solid var(--border); border-radius: 0 0 6px 6px;
            overflow-y: auto; outline: none; line-height: 1.6;
        }

        button.main-btn {
            width: 100%; background: var(--accent); color: white;
            border: none; padding: 15px; border-radius: 6px;
            font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        button.main-btn:hover { filter: brightness(1.2); }

        .theme-switcher { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; }
        .theme-btn { width: 30px; height: 30px; border-radius: 50%; border: 2px solid white; cursor: pointer; }

    </style>
</head>
<body>

<nav>
    <h2 style="font-size: 18px; cursor: pointer;" onclick="location.href='index.html'">Wolf<span style="color:var(--accent)">Vox</span></h2>
    <div style="flex-grow: 1;"></div>
    <div style="font-size: 14px; display: flex; gap: 15px;">
        <a href="index.html" style="color:var(--text-dim); text-decoration:none;">Back to Home</a>
    </div>
</nav>

<section class="publish-container">
    <h1>Create New Form</h1>
    <p>Design your form with rich text, images, and links.</p>

    <div class="input-group">
        <label>Form Title</label>
        <input id="title" placeholder="What is this form about?">
    </div>

    <div class="input-group">
        <label>Description (Rich Text)</label>
        <div class="toolbar">
            <button class="tool-btn" onclick="execCmd('bold')" title="Bold"><i class="fa-solid fa-bold"></i></button>
            <button class="tool-btn" onclick="execCmd('italic')" title="Italic"><i class="fa-solid fa-italic"></i></button>
            <button class="tool-btn" onclick="execCmd('fontName', 'Arial')" style="font-family: Arial;">Arial</button>
            <button class="tool-btn" onclick="execCmd('foreColor', '#7a6cff')"><i class="fa-solid fa-palette" style="color:#7a6cff"></i></button>
        </div>
        <div id="editor" contenteditable="true" placeholder="Write your description here..."></div>
    </div>

    <div class="input-group">
        <label>Media & Attachments</label>
        <input id="image" placeholder="Image URL (Direct link)">
        <input id="video" style="margin-top:10px" placeholder="Video Link (YouTube/MP4)">
    </div>

    <div class="input-group">
        <label>Resources</label>
        <input id="file" placeholder="Download File URL">
        <input id="links" style="margin-top:10px" placeholder="Extra Links (comma separated)">
    </div>

    <button class="main-btn" onclick="submitForm()">
        <i class="fa-solid fa-paper-plane"></i> Publish to WolfVox
    </button>
</section>

<div class="theme-switcher">
    <button class="theme-btn" style="background:#7a6cff" onclick="document.documentElement.style.setProperty('--accent', '#7a6cff')"></button>
    <button class="theme-btn" style="background:#00e0ff" onclick="document.documentElement.style.setProperty('--accent', '#00e0ff')"></button>
    <button class="theme-btn" style="background:#ff4dff" onclick="document.documentElement.style.setProperty('--accent', '#ff4dff')"></button>
</div>

<script>
const API = "https://backhand-forms.onrender.com/api/forms";

// Editor Commands
function execCmd(command, value = null) {
    document.execCommand(command, false, value);
}

// Submit Data
async function submitForm() {
    const title = document.getElementById("title").value;
    const content = document.getElementById("editor").innerHTML; // Gets formatted HTML
    const image = document.getElementById("image").value;
    const video = document.getElementById("video").value;
    const file = document.getElementById("file").value;
    const rawLinks = document.getElementById("links").value;
    
    if(!title || !content) {
        alert("Title and Description are required!");
        return;
    }

    const linksArr = rawLinks ? rawLinks.split(",").map(l => l.trim()) : [];

    try {
        const res = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                title,
                content,
                image,
                video,
                file,
                links: linksArr,
                date: new Date().toLocaleDateString()
            })
        });

        if(res.ok) {
            alert("Form Published Successfully!");
            window.location.href = "index.html";
        }
    } catch (e) {
        alert("Error connecting to server.");
    }
}
</script>

</body>
</html>
