<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WolfVox™ | Create Form</title>
    <link rel="icon" type="image/x-icon" href="https://github.com/WolfVox/wolfvox.github.io/blob/main/WolfVoxLogo.png?raw=true">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root {
            --bg: #000000;
            --header: #000000;
            --card-bg: #0f0f10;
            --Notic-bg: rgb(0, 0, 0);
            --border: #2d2d30;
            --accent: #7a6cff;
            --text-main: #eeeeee;
            --text-dim: #a1a1aa;
            --render-green: #00d1b2;
            --error: #ff4d4d;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: all 0.1s ease; }
        
        body { 
            background-color: var(--bg); 
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            color: var(--text-main); margin: 0; padding-bottom: 100px;
        }

        /* NAVIGATION (Hub Standard) */
        nav {
            display: flex; align-items: center; gap: 20px;
            padding: 12px 30px; background: var(--header); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .search-container { flex: 1; max-width: 400px; position: relative; }
        .search-container input {
            width: 100%; background: #000; border: 1px solid var(--border);
            color: white; padding: 6px 12px 6px 35px; border-radius: 6px; font-size: 13px;
        }
        .search-container i { position: absolute; left: 12px; top: 9px; color: var(--text-dim); font-size: 12px; }

        .sub-nav {
            display: flex; gap: 5px; padding: 10px 30px; 
            background: var(--header); border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }
        .sub-btn {
            background: transparent; border: none; color: var(--text-main);
            padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .sub-btn:hover { background: var(--border); }

        /* EDITOR LAYOUT */
        .publish-container { max-width: 850px; margin: 0 auto; padding: 40px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; }

        .user-identity {
            display: flex; align-items: center; gap: 12px;
            background: rgba(122, 108, 255, 0.05);
            padding: 15px; border-radius: 8px; border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .input-group { margin-bottom: 25px; }
        label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        input {
            width: 100%; background: #000; border: 1px solid var(--border);
            color: white; padding: 12px; border-radius: 6px; font-size: 14px; margin-bottom: 10px;
        }
        input:focus { border-color: var(--accent); outline: none; }

        .toolbar {
            display: flex; gap: 8px; background: #000; 
            padding: 10px; border: 1px solid var(--border); 
            border-bottom: none; border-radius: 6px 6px 0 0;
        }
        .tool-btn {
            background: transparent; border: 1px solid transparent; 
            color: white; cursor: pointer; padding: 8px 12px; border-radius: 6px; font-size: 13px;
        }
        .tool-btn:hover { background: var(--border); }
        .tool-btn.active-tool { background: rgba(122, 108, 255, 0.15); border-color: var(--accent); color: var(--accent); }
        
        #editor {
            min-height: 250px; padding: 20px; background: #000;
            border: 1px solid var(--border); border-radius: 0 0 6px 6px;
            outline: none; line-height: 1.6; color: #fff; overflow-y: auto;
        }

        .plus-btn {
            background: transparent; border: 1px dashed var(--border);
            color: var(--accent); padding: 10px; border-radius: 6px;
            cursor: pointer; width: 100%; margin-bottom: 20px; font-size: 12px; font-weight: bold;
        }
        .plus-btn:hover { background: rgba(122, 108, 255, 0.05); border-color: var(--accent); }

        #chromaPalette { display: none; gap: 8px; padding: 12px; background: #000; border: 1px solid var(--border); border-top: none; }
        .color-box { width: 22px; height: 22px; border-radius: 4px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }

        .FeedBackBtn {
            position:relative; overflow:hidden; border-radius:0px; border:1px solid rgb(255, 255, 255);
            background:rgba(0, 0, 0, 0.02); color:white; font-weight:600; letter-spacing:0.4px;
            backdrop-filter:blur(6px); transition:all .25s cubic-bezier(.4,0,.2,1);
            box-shadow:0 4px 18px rgba(0,0,0,0.25); padding:15px; flex:1; width: 100%; margin-top: 30px; cursor: pointer;
        }
        .FeedBackBtn:hover { color:#000; background:#fff; }

        footer { text-align: center; padding: 50px; color: var(--text-dim); font-size: 13px; background-color: #000; border-top: 1px solid var(--border); margin-top: 100px;}
    </style>
</head>
<body>

<nav>
    <img src="https://github.com/WolfVox/wolfvox.github.io/blob/main/WolfVoxLogo.png?raw=true" height="30px" width="30px" onclick="location.href='index.html'" style="cursor:pointer">
    <h2 style="font-size: 18px; margin:0;">Wolf<span style="color:var(--accent)">Vox</span></h2>
    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search forms..." onkeyup="if(event.key==='Enter') window.location.href='index.html?q='+this.value">
    </div>
    <div style="flex-grow: 1;"></div>
    <div class="nav-links" id="navAuthArea" style="font-size: 14px; display: flex; gap: 15px; align-items: center;">
        </div>
</nav>

<div class="sub-nav">
    <button class="sub-btn" onclick="location.href='index.html'"><i class="fa-solid fa-code"></i> Forms</button>
    <button class="sub-btn" onclick="location.href='Market'"><i class="fa-solid fa-shop"></i> Marketplace</button>
    <button class="sub-btn" onclick="location.href='Docs'"><i class="fa-solid fa-book"></i> Docs</button>
    <button class="sub-btn" onclick="location.href='Insights'"><i class="fa-solid fa-chart-line"></i> Insights</button>
</div>

<section class="publish-container">
    <div class="user-identity" id="authorDisplay">
        <img id="userImg" src="https://ui-avatars.com/api/?name=?" width="45" style="border-radius:50%; border:2px solid var(--accent)">
        <div>
            <div id="userName" style="font-weight: 700; color: white; font-size: 16px;">Authenticating...</div>
            <div id="userEmail" style="font-size: 12px; color: var(--text-dim);">Connecting to WolfVox ID</div>
        </div>
    </div>

    <h1 style="margin: 0 0 10px 0; font-size: 28px;">New Publication</h1>
    <p style="color:var(--text-dim); font-size: 14px; margin-bottom: 40px;">Share your creation with the WolfVox community.</p>

    <div class="input-group">
        <label>Title</label>
        <input id="title" placeholder="Give your form a clear name...">
    </div>

    <div class="input-group">
        <label>Rich Text Content</label>
        <div class="toolbar">
            <button id="btn-bold" class="tool-btn" onclick="execCmd('bold')"><i class="fa-solid fa-bold"></i></button>
            <button id="btn-italic" class="tool-btn" onclick="execCmd('italic')"><i class="fa-solid fa-italic"></i></button>
            <button id="btn-arial" class="tool-btn" onclick="execCmd('fontName', 'Arial')">Arial</button>
            <button id="btn-palette" class="tool-btn" onclick="toggleChroma()"><i class="fa-solid fa-palette"></i></button>
            <button class="tool-btn" onclick="execCmd('removeFormat')"><i class="fa-solid fa-eraser"></i></button>
        </div>
        <div id="chromaPalette">
            <div class="color-box" style="background:#ff4d4d" onclick="execCmd('foreColor', '#ff4d4d')"></div>
            <div class="color-box" style="background:#4dff4d" onclick="execCmd('foreColor', '#4dff4d')"></div>
            <div class="color-box" style="background:#00e0ff" onclick="execCmd('foreColor', '#00e0ff')"></div>
            <div class="color-box" style="background:#ffff4d" onclick="execCmd('foreColor', '#ffff4d')"></div>
            <div class="color-box" style="background:#7a6cff" onclick="execCmd('foreColor', '#7a6cff')"></div>
            <div class="color-box" style="background:#ffffff" onclick="execCmd('foreColor', '#ffffff')"></div>
        </div>
        <div id="editor" contenteditable="true" onkeyup="updateToolbar()" onclick="updateToolbar()"></div>
    </div>

    <div class="input-group">
        <label>Media & Attachments</label>
        <div id="imgSection"><input name="image" placeholder="Primary Image URL (HTTPS)"></div>
        <button class="plus-btn" onclick="addField('imgSection')">+ Add Image Slot</button>

        <div id="vidSection"><input name="video" placeholder="YouTube Video URL"></div>
        <button class="plus-btn" onclick="addField('vidSection')">+ Add Video Slot</button>

        <label>Direct File Access</label>
        <input id="file" placeholder="Main Download URL (Zip, Exe, or PDF)">

        <div id="linkSection"><input name="links" placeholder="Additional Link (e.g. GitHub)"></div>
        <button class="plus-btn" onclick="addField('linkSection')">+ Add Link Slot</button>
    </div>

    <button class="FeedBackBtn" onclick="submitForm()">
        <i class="fa-solid fa-paper-plane"></i> PUBLISH TO DATABASE
    </button>
</section>



<script>
    const API = "https://backhand-forms.onrender.com/api/forms";
    const user = JSON.parse(localStorage.getItem('wv_user'));

    if (!user) {
        alert("Authorization Required. Redirecting...");
        window.location.href = "index.html";
    } else {
        document.getElementById('userName').innerText = user.name;
        document.getElementById('userEmail').innerText = user.email;
        document.getElementById('userImg').src = user.img;
        
        document.getElementById('navAuthArea').innerHTML = `
            <div style="display:flex; align-items:center; gap:10px; background:var(--card-bg); padding:5px 10px; border-radius:20px; border:1px solid var(--border);">
                <span style="font-size:12px;">${user.name}</span>
                <img src="${user.img}" width="24" height="24" style="border-radius:50%; border:1px solid var(--accent);">
            </div>
            <a href="#" onclick="localStorage.removeItem('wv_user'); location.reload();" style="color:var(--error); text-decoration:none; font-size:11px;">Logout</a>`;
    }

    const hasChroma = localStorage.getItem('wv_plugin_chroma') === 'unlocked';
    const hasExpansion = localStorage.getItem('wv_plugin_expansion') === 'unlocked';

    function updateToolbar() {
        document.getElementById('btn-bold').classList.toggle('active-tool', document.queryCommandState('bold'));
        document.getElementById('btn-italic').classList.toggle('active-tool', document.queryCommandState('italic'));
        const font = document.queryCommandValue('fontName');
        document.getElementById('btn-arial').classList.toggle('active-tool', font.includes('Arial'));
        const color = document.queryCommandValue('foreColor');
        document.getElementById('btn-palette').classList.toggle('active-tool', (color && color !== 'rgb(238, 238, 238)' && color !== 'white'));
    }

    function execCmd(command, value = null) {
        document.getElementById('editor').focus();
        document.execCommand(command, false, value);
        updateToolbar();
    }

    function toggleChroma() {
        if(hasChroma) {
            const p = document.getElementById('chromaPalette');
            p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
        } else {
            execCmd('foreColor', '#7a6cff');
        }
    }

    function addField(id) {
        if(hasExpansion) {
            const container = document.getElementById(id);
            const input = document.createElement('input');
            input.placeholder = "Additional URL...";
            container.appendChild(input);
        } else {
            alert("🔒 Feature Locked! Visit Marketplace for the Expansion Pack.");
        }
    }

    async function submitForm() {
        const title = document.getElementById('title').value;
        const content = document.getElementById('editor').innerHTML;
        const file = document.getElementById('file').value;

        if(!title || content === "" || content === "<br>") return alert("Please fill title and description.");

        const images = Array.from(document.querySelectorAll('#imgSection input')).map(i => i.value).filter(v => v);
        const videos = Array.from(document.querySelectorAll('#vidSection input')).map(i => i.value).filter(v => v);
        const linksArr = Array.from(document.querySelectorAll('#linkSection input')).map(i => i.value).filter(v => v);

        try {
            const response = await fetch(API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    title, 
                    content, 
                    image: images[0] || "", 
                    images,
                    video: videos[0] || "", 
                    videos,
                    file, 
                    links: linksArr,
                    date: new Date().toLocaleDateString(),
                    authorName: user.name,
                    authorEmail: user.email,
                    authorImg: user.img
                })
            });

            if(response.ok) {
                alert("Successfully Published!");
                window.location.href = "index.html";
            } else {
                alert("Server rejected the publication.");
            }
        } catch (e) {
            alert("Connection to backend lost.");
        }
    }
</script>
</body>
</html>
