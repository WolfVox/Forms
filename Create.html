<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WolfVox™ | Create Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #060608;
            --header: #111113;
            --card-bg: #161618;
            --border: #2d2d30;
            --accent: #7a6cff;
            --text-main: #eeeeee;
            --text-dim: #a1a1aa;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: all 0.1s ease; }
        body { 
            background-color: var(--bg); 
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            color: var(--text-main); margin: 0; padding-bottom: 100px;
        }

        nav { padding: 12px 30px; background: var(--header); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }

        .publish-container { max-width: 800px; margin: 40px auto; padding: 40px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; }

        .input-group { margin-bottom: 25px; }
        label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; }

        input {
            width: 100%; background: #000; border: 1px solid var(--border);
            color: white; padding: 12px; border-radius: 6px; font-size: 14px; margin-bottom: 10px;
        }

        /* --- TOOLBAR HIGHLIGHTING --- */
        .toolbar {
            display: flex; gap: 8px; background: var(--header); 
            padding: 10px; border: 1px solid var(--border); 
            border-bottom: none; border-radius: 6px 6px 0 0;
        }
        .tool-btn {
            background: transparent; border: 1px solid transparent; 
            color: white; cursor: pointer; padding: 8px 12px; border-radius: 6px;
        }
        /* The "Active" state border and glow */
        .tool-btn.active-tool { 
            background: rgba(122, 108, 255, 0.15); 
            border: 1px solid var(--accent) !important; 
            color: var(--accent);
            box-shadow: 0 0 10px rgba(122, 108, 255, 0.3);
        }
        
        #editor {
            min-height: 250px; padding: 20px; background: #000;
            border: 1px solid var(--border); border-radius: 0 0 6px 6px;
            outline: none; line-height: 1.6; color: #fff;
        }

        .plus-btn {
            background: transparent; border: 1px dashed var(--border);
            color: var(--accent); padding: 10px; border-radius: 6px;
            cursor: pointer; width: 100%; margin-top: 5px;
        }

        #chromaPalette { display: none; gap: 8px; padding: 10px; background: var(--header); border: 1px solid var(--border); border-top: none; }
        .color-box { width: 24px; height: 24px; border-radius: 4px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }

        .submit-btn {
            width: 100%; background: var(--accent); color: white;
            border: none; padding: 16px; border-radius: 6px;
            font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 30px;
        }
    </style>
</head>
<body>

<nav>
    <h2 onclick="location.href='index.html'" style="cursor:pointer">Wolf<span style="color:var(--accent)">Vox</span></h2>
    <a href="index.html" style="color:var(--text-dim); text-decoration:none;">Cancel</a>
</nav>

<section class="publish-container">
    <h1>Create Form</h1>

    <div class="input-group">
        <label>Title</label>
        <input id="title" placeholder="Form Title">
    </div>

    <div class="input-group">
        <label>Description</label>
        <div class="toolbar">
            <button id="btn-bold" class="tool-btn" onclick="execCmd('bold')"><i class="fa-solid fa-bold"></i></button>
            <button id="btn-italic" class="tool-btn" onclick="execCmd('italic')"><i class="fa-solid fa-italic"></i></button>
            <button id="btn-arial" class="tool-btn" onclick="execCmd('fontName', 'Arial')">Arial</button>
            <button id="btn-palette" class="tool-btn" onclick="toggleChroma()"><i class="fa-solid fa-palette"></i></button>
            <button class="tool-btn" onclick="execCmd('removeFormat')"><i class="fa-solid fa-eraser"></i></button>
        </div>
        <div id="chromaPalette">
            <div class="color-box" style="background:#ff4d4d" onclick="execCmd('foreColor', '#ff4d4d')"></div>
            <div class="color-box" style="background:#4dff4d" onclick="execCmd('foreColor', '#4dff4d')"></div>
            <div class="color-box" style="background:#00e0ff" onclick="execCmd('foreColor', '#00e0ff')"></div>
            <div class="color-box" style="background:#ffff4d" onclick="execCmd('foreColor', '#ffff4d')"></div>
            <div class="color-box" style="background:#7a6cff" onclick="execCmd('foreColor', '#7a6cff')"></div>
        </div>
        <div id="editor" contenteditable="true" onkeyup="updateToolbar()" onclick="updateToolbar()"></div>
    </div>

    <div class="input-group">
        <label>Image Assets</label>
        <div id="imgArea"><input placeholder="Image URL"></div>
        <button class="plus-btn" onclick="addField('imgArea')"><i class="fa-solid fa-plus"></i></button>
    </div>

    <button class="submit-btn" onclick="submitForm()">Publish Form</button>
</section>

<script>
    const API = "https://backhand-forms.onrender.com/api/forms";
    const hasChroma = localStorage.getItem('wv_plugin_chroma') === 'unlocked';
    const hasExpansion = localStorage.getItem('wv_plugin_expansion') === 'unlocked';

    // --- TOOLBAR STATE HIGHLIGHTER ---
    function updateToolbar() {
        // Bold Check
        document.getElementById('btn-bold').classList.toggle('active-tool', document.queryCommandState('bold'));
        // Italic Check
        document.getElementById('btn-italic').classList.toggle('active-tool', document.queryCommandState('italic'));
        // Font Check
        const font = document.queryCommandValue('fontName');
        document.getElementById('btn-arial').classList.toggle('active-tool', font.includes('Arial'));
        
        // Palette Check (if text is colored)
        const color = document.queryCommandValue('foreColor');
        const isColored = color && color !== 'rgb(238, 238, 238)' && color !== 'white';
        document.getElementById('btn-palette').classList.toggle('active-tool', isColored);
    }

    function execCmd(command, value = null) {
        document.getElementById('editor').focus();
        document.execCommand(command, false, value);
        updateToolbar(); // Refresh highlights immediately
    }

    function toggleChroma() {
        if(hasChroma) {
            const p = document.getElementById('chromaPalette');
            p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
        } else {
            execCmd('foreColor', '#7a6cff');
        }
    }

    function addField(id) {
        if(hasExpansion) {
            const container = document.getElementById(id);
            const input = document.createElement('input');
            input.placeholder = "Additional URL...";
            container.appendChild(input);
        } else {
            alert("🔒 Unlock Expansion Pack in Marketplace!");
            window.location.href = "Market.html";
        }
    }

    async function submitForm() {
        const title = document.getElementById('title').value;
        const content = document.getElementById('editor').innerHTML;
        if(!title || content === "") return alert("Fill all fields.");

        const images = Array.from(document.querySelectorAll('#imgArea input')).map(i => i.value).filter(v => v);

        await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title, content, image: images[0], date: new Date().toLocaleDateString() })
        });
        window.location.href = "index.html";
    }
</script>
</body>
</html>
