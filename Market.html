<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WolfVox™ | Marketplace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --bg: #060608; --header: #111113; --card-bg: #161618; --border: #2d2d30; --accent: #7a6cff; --text-main: #eeeeee; --text-dim: #a1a1aa; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; 
               background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 60px 60px; }
        
        nav { display: flex; align-items: center; padding: 12px 30px; background: var(--header); border-bottom: 1px solid var(--border); }
        .grid { max-width: 1000px; margin: 50px auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        
        .plugin-card { background: var(--card-bg); border: 1px solid var(--border); padding: 25px; border-radius: 12px; transition: 0.3s; }
        .plugin-card:hover { border-color: var(--accent); }
        .plugin-card h3 { margin: 0 0 10px 0; display: flex; align-items: center; gap: 10px; color: var(--accent); }
        .plugin-card p { font-size: 13px; color: var(--text-dim); line-height: 1.5; height: 40px; }
        
        .get-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 600; margin-top: 15px; }
        .get-btn.owned { background: #22c55e; cursor: default; }

        /* Verification Modal */
        .v-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 10000; }
        .v-content { background: var(--card-bg); padding: 40px; border-radius: 12px; border: 1px solid var(--accent); text-align: center; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 20px 0; background: #000; border: 1px solid var(--border); color: white; text-align: center; font-size: 18px; letter-spacing: 2px; }
    </style>
</head>
<body>

<nav>
    <h2 onclick="location.href='/Forms'" style="cursor:pointer">Wolf<span style="color:var(--accent)">Vox</span> Dashboard</h2>
</nav>

<div class="grid">
    <div class="plugin-card">
        <h3><i class="fa-solid fa-droplet"></i> Chroma+</h3>
        <p>Unlock the full color spectrum for text. Standard version only has 1 color.</p>
        <button id="btn-chroma" class="get-btn" onclick="openVerify('chroma')">Get It</button>
    </div>

    <div class="plugin-card">
        <h3><i class="fa-solid fa-square-plus"></i> Expansion Pack</h3>
        <p>Unlock the <b>[+]</b> buttons to add multiple images, videos, and links per form.</p>
        <button id="btn-expansion" class="get-btn" onclick="openVerify('expansion')">Get It</button>
    </div>
</div>

<div id="verifyModal" class="v-modal">
    <div class="v-content">
        <h3 id="modalTitle">Verification</h3>
        <p style="color: var(--text-dim);">Type the secret word in <b style="color:white">CAPS</b> to install:</p>
        <h1 id="targetWord" style="letter-spacing: 8px; color: var(--accent); margin: 20px 0;">WOLFVOK</h1>
        <input type="text" id="userInput" placeholder="EX: HELLO">
        <button class="get-btn" onclick="checkVerify()">Verify & Install</button>
        <p onclick="closeVerify()" style="color:var(--text-dim); cursor:pointer; margin-top:15px; font-size:12px;">Go Back</p>
    </div>
</div>

<script>
    let currentPlugin = "";
    const words = ["DEVELOPER", "RENDER", "WOLFVOK", "API", "WOLF"];

    function openVerify(id) {
        currentPlugin = id;
        document.getElementById('targetWord').innerText = words[Math.floor(Math.random()*words.length)];
        document.getElementById('verifyModal').style.display = 'flex';
    }

    function closeVerify() { document.getElementById('verifyModal').style.display = 'none'; }

    function checkVerify() {
        const target = document.getElementById('targetWord').innerText;
        const input = document.getElementById('userInput').value;
        if(input === target) {
            localStorage.setItem('wv_plugin_' + currentPlugin, 'unlocked');
            alert("Success! Plugin installed.");
            location.reload();
        } else { alert("Incorrect. Please try again in ALL CAPS."); }
    }

    // Check ownership
    if(localStorage.getItem('wv_plugin_chroma')) {
        const b = document.getElementById('btn-chroma'); b.innerText = "Installed"; b.className = "get-btn owned"; b.onclick = null;
    }
    if(localStorage.getItem('wv_plugin_expansion')) {
        const b = document.getElementById('btn-expansion'); b.innerText = "Installed"; b.className = "get-btn owned"; b.onclick = null;
    }
</script>
</body>
</html>
