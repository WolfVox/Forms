<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="https://github.com/WolfVox/wolfvox.github.io/blob/main/WolfVoxLogo.png?raw=true">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WolfVox™ | Insights</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000000;
            --header: #000000;
            --card-bg: #0f0f10;
            --Notic-bg: rgb(0, 0, 0);
            --border: #2d2d30;
            --accent: #7a6cff;
            --text-main: #eeeeee;
            --text-dim: #a1a1aa;
            --render-green: #00d1b2;
            --error: #ff4d4d;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 30px; overflow-x: hidden; }

        /* NAVBARS */
        nav { display: flex; align-items: center; padding: 12px 30px; background: var(--header); border-bottom: 1px solid var(--border); justify-content: space-between; }
        .sub-nav { display: flex; gap: 15px; padding: 10px 30px; background: var(--header); border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .sub-btn { background: none; border: none; color: var(--text-dim); font-size: 13px; cursor: pointer; padding: 8px 12px; display: flex; align-items: center; gap: 8px; border-bottom: 2px solid transparent; }
        .sub-btn.active { color: var(--text-main); border-bottom: 2px solid var(--accent); }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        
        /* STAT CARDS - Made more compact */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); padding: 15px 20px; border-radius: 10px; }
        .stat-card h3 { color: var(--text-dim); font-size: 11px; text-transform: uppercase; margin: 0; letter-spacing: 1px; }
        .stat-card p { font-size: 24px; font-weight: 800; margin: 5px 0 0 0; color: var(--accent); }

        /* GRAPH BOXES - Height Reduced */
        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .chart-box { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            padding: 20px; 
            border-radius: 10px; 
            height: 280px; /* Reduced height from 350px */
            display: flex;
            flex-direction: column;
        }
        .chart-box h4 { margin-top: 0; color: var(--text-main); font-size: 14px; margin-bottom: 15px; font-weight: 500; }
        .canvas-container { flex: 1; position: relative; width: 100%; min-height: 0; }
        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; transition: all 0.15s ease; }
        
        body { 
            background-color: var(--bg); 
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            color: var(--text-main); 
            margin: 0; 
        }

        nav {
            display: flex; align-items: center; gap: 20px;
            padding: 12px 30px; background: var(--header); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .search-container { flex: 1; max-width: 400px; position: relative; }
        .search-container input {
            width: 100%; background: #000; border: 1px solid var(--border);
            color: white; padding: 6px 12px 6px 35px; border-radius: 6px; font-size: 13px;
        }
        .search-container i { position: absolute; left: 12px; top: 9px; color: var(--text-dim); font-size: 12px; }

        .sub-nav {
            display: flex; gap: 5px; padding: 10px 30px; 
            background: var(--header); border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }
        .sub-btn {
            background: transparent; border: none; color: var(--text-main);
            padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .sub-btn:hover { background: var(--border); }
        .sub-btn.active { border-bottom: 2px solid #f78166; border-radius: 0; font-weight: 600; }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; min-height: 60vh; }
        .form-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px; background: var(--card-bg); border: 1px solid var(--border);
            margin-bottom: -1px; cursor: pointer;
        }
        .form-row:first-child { border-radius: 6px 6px 0 0; }
        .form-row:last-child { border-radius: 0 0 6px 6px; margin-bottom: 50px; }
        .form-row:hover { background: #1c1c1f; border-color: var(--text-dim); z-index: 5; position: relative; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 3000; }
        .modal-content { background: var(--card-bg); border: 1px solid var(--border); padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; }
        .modal-content input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: white; border-radius: 6px; }
        
        .overlay {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 600px;
            height: 100%; background: var(--header); border-left: 1px solid var(--border);
            z-index: 2000; padding: 60px 40px; overflow-y: auto;
        }
        .overlay.active { right: 0; box-shadow: -20px 0 50px rgba(0,0,0,0.8); }
        .close-btn { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 24px; color: var(--text-dim); }

        .sitemap-container {
            max-width: 100%; margin-top: 20px auto;
            background: var(--Notic-bg); border-top: rgba(255, 255, 255, 0.235) solid 0.5px;
            padding: 40px; display: flex;
            justify-content: space-evenly; align-items: center;
        }
        .sitemap-col a { display: block; color: var(--accent); text-decoration: none; margin-bottom: 8px; font-size: 14px; display: flex; align-items: center; justify-content: center; }
        
        footer { text-align: center; padding: 40px; color: var(--text-dim); font-size: 13px; background-color: #000000 ; border-top: 1px solid var(--border); }
        .img-preview { width: 100%; border-radius: 8px; margin: 20px 0; border: 1px solid var(--border); display: block; }
        .vote-disabled { opacity: 0.3; cursor: not-allowed !important; pointer-events: none; }

        .FeedBackBtn {
            position:relative; overflow:hidden; border-radius:0px; border:1px solid rgb(255, 255, 255);
            background:rgba(0, 0, 0, 0.02); color:white; font-weight:600; letter-spacing:0.4px;
            backdrop-filter:blur(6px); transition:all .25s cubic-bezier(.4,0,.2,1);
            box-shadow:0 4px 18px rgba(0,0,0,0.25); padding:15px; flex:1; height:100%;
        }
        .SiteMapImage {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 5px;
            width: 5px;
        }
        .FeedBackBtn::before {
            content:""; position:absolute; inset:0; background:#ffffff; transform:scaleX(0);
            transform-origin:right; transition:transform .35s cubic-bezier(.65,0,.35,1); z-index:-1;
        }
        .FeedBackBtn:hover::before { transform-origin:left; transform:scaleX(1); }
        .FeedBackBtn:hover { color:#000; border-color:#ffffff; }
        @media (max-width: 800px) { .chart-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <img style=" margin:0 auto;" src="https://github.com/WolfVox/wolfvox.github.io/blob/main/WolfVoxLogo.png?raw=true" alt="?" height="30px" width="30px" >
    <h2 style="font-size: 18px; margin:0;">Wolf<span style="color:var(--accent)">Vox</span></h2>
    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Search or jump to..." onkeyup="if(event.key==='Enter') searchForms()">
    </div>
    <div style="flex-grow: 1;"></div>
    <div class="nav-links" id="navAuthArea" style="font-size: 14px; display: flex; gap: 15px; align-items: center;">
        <a href="javascript:void(0)" onclick="location.href='/Forms'" style="color:white; text-decoration:none;">Sign In</a>
        <button onclick="location.href='Create'" class="FeedBackBtn">Publish</button>
    </div>
</nav>

<div class="sub-nav">
    <button class="sub-btn" onclick="location.href='/Forms'"><i class="fa-solid fa-code"></i> Forms</button>
    <button class="sub-btn" onclick="location.href='Market'"><i class="fa-solid fa-shop"></i> Marketplace</button>
    <button class="sub-btn" onclick="location.href='Docs'"><i class="fa-solid fa-book"></i> Docs</button>
    <button class="sub-btn active"><i class="fa-solid fa-chart-line"></i> Insights</button>
</div>

<div class="container">
    <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Forms</h3>
            <p id="totalForms">--</p>
        </div>
        <div class="stat-card">
            <h3>Daily Active</h3>
            <p>4</p>
        </div>
        <div class="stat-card">
            <h3>Monthly Active</h3>
            <p>26</p>
        </div>
        <div class="stat-card">
            <h3>Avg. Likes</h3>
            <p id="avgLikes">--</p>
        </div>
    </div>

    <div class="chart-row">
        <div class="chart-box">
            <h4>Traffic Overview</h4>
            <div class="canvas-container">
                <canvas id="userChart"></canvas>
            </div>
        </div>
        <div class="chart-box">
            <h4>Submission Volume</h4>
            <div class="canvas-container">
                <canvas id="formChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    const API = "https://backhand-forms.onrender.com/api/forms";

    async function loadStats() {
        try {
            const res = await fetch(API);
            const data = await res.json();
            
            const total = data.length;
            const totalLikes = data.reduce((sum, item) => sum + (item.likes || 0), 0);
            const avg = total > 0 ? (totalLikes / total).toFixed(1) : 0;

            document.getElementById('totalForms').innerText = total;
            document.getElementById('avgLikes').innerText = avg;

            renderCharts(data);
        } catch (e) {
            console.error("Stats failed to load");
            document.getElementById('totalForms').innerText = "Err";
        }
    }

    function renderCharts(apiData) {
        Chart.defaults.color = '#a1a1aa';
        Chart.defaults.font.family = 'Inter';

        // User Chart
        new Chart(document.getElementById('userChart'), {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    data: [2, 5, 3, 4, 8, 12, 7],
                    borderColor: '#7a6cff',
                    backgroundColor: 'rgba(122, 108, 255, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, grid: { color: '#2d2d30' } },
                    x: { grid: { display: false } }
                }
            }
        });

        // Form Chart
        new Chart(document.getElementById('formChart'), {
            type: 'bar',
            data: {
                labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
                datasets: [{
                    data: [15, 25, 20, apiData.length],
                    backgroundColor: '#7a6cff',
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: '#2d2d30' } },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    window.onload = loadStats;
</script>

</body>
</html>
