<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WolfVox™ | Insights</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #060608;
            --header: #111113;
            --card-bg: #161618;
            --border: #2d2d30;
            --accent: #7a6cff;
            --text-main: #eeeeee;
            --text-dim: #a1a1aa;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 50px; }

        /* NAVBARS */
        nav { display: flex; align-items: center; padding: 12px 30px; background: var(--header); border-bottom: 1px solid var(--border); justify-content: space-between; }
        .sub-nav { display: flex; gap: 15px; padding: 10px 30px; background: var(--header); border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        .sub-btn { background: none; border: none; color: var(--text-dim); font-size: 14px; cursor: pointer; padding: 8px 12px; display: flex; align-items: center; gap: 8px; border-bottom: 2px solid transparent; }
        .sub-btn.active { color: var(--text-main); border-bottom: 2px solid var(--accent); }

        /* DASHBOARD LAYOUT */
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        
        /* STAT CARDS */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); padding: 25px; border-radius: 12px; text-align: center; }
        .stat-card h3 { color: var(--text-dim); font-size: 12px; text-transform: uppercase; margin: 0; letter-spacing: 1px; }
        .stat-card p { font-size: 32px; font-weight: 800; margin: 10px 0 0 0; color: var(--accent); }

        /* GRAPH BOXES */
        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-box { background: var(--card-bg); border: 1px solid var(--border); padding: 25px; border-radius: 12px; min-height: 350px; }
        .chart-box h4 { margin-top: 0; color: var(--text-main); font-size: 16px; margin-bottom: 20px; }

        @media (max-width: 800px) { .chart-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <h2 onclick="location.href='index'" style="cursor:pointer; margin:0; font-size: 20px;">Wolf<span style="color:var(--accent)">Vox</span></h2>
    <div style="color: var(--text-dim); font-size: 13px;">Platform Analytics</div>
</nav>

<div class="sub-nav">
    <button class="sub-btn" onclick="location.href='index'"><i class="fa-solid fa-code"></i> Forms</button>
    <button class="sub-btn" onclick="location.href='Market'"><i class="fa-solid fa-shop"></i> Marketplace</button>
    <button class="sub-btn" onclick="location.href='Docs'"><i class="fa-solid fa-book"></i> Docs</button>
    <button class="sub-btn active"><i class="fa-solid fa-chart-line"></i> Insights</button>
</div>

<div class="container">
    <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Forms</h3>
            <p id="totalForms">0</p>
        </div>
        <div class="stat-card">
            <h3>Daily Users</h3>
            <p>4</p>
        </div>
        <div class="stat-card">
            <h3>Monthly Active</h3>
            <p>26</p>
        </div>
        <div class="stat-card">
            <h3>Avg. Likes</h3>
            <p id="avgLikes">0</p>
        </div>
    </div>

    

    <div class="chart-row">
        <div class="chart-box">
            <h4>User Activity (Daily/Monthly)</h4>
            <canvas id="userChart"></canvas>
        </div>
        <div class="chart-box">
            <h4>Form Growth (New Submissions)</h4>
            <canvas id="formChart"></canvas>
        </div>
    </div>
</div>

<script>
    const API = "https://backhand-forms.onrender.com/api/forms";

    async function loadStats() {
        try {
            const res = await fetch(API);
            const data = await res.json();
            
            // Calculate Stats
            const total = data.length;
            const totalLikes = data.reduce((sum, item) => sum + (item.likes || 0), 0);
            const avg = total > 0 ? (totalLikes / total).toFixed(1) : 0;

            document.getElementById('totalForms').innerText = total;
            document.getElementById('avgLikes').innerText = avg;

            renderCharts();
        } catch (e) {
            console.error("Stats failed to load");
        }
    }

    function renderCharts() {
        // User Activity Line Chart
        const ctxUser = document.getElementById('userChart').getContext('2d');
        new Chart(ctxUser, {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    label: 'Daily Traffic',
                    data: [800, 1200, 950, 1400, 1800, 2200, 1900],
                    borderColor: '#7a6cff',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(122, 108, 255, 0.1)'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: '#2d2d30' }, ticks: { color: '#a1a1aa' } },
                    x: { grid: { display: false }, ticks: { color: '#a1a1aa' } }
                }
            }
        });

        // Form Submissions Bar Chart
        const ctxForm = document.getElementById('formChart').getContext('2d');
        new Chart(ctxForm, {
            type: 'bar',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'Forms Published',
                    data: [45, 80, 120, 190, 240, 310],
                    backgroundColor: '#7a6cff',
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: '#2d2d30' }, ticks: { color: '#a1a1aa' } },
                    x: { grid: { display: false }, ticks: { color: '#a1a1aa' } }
                }
            }
        });
    }

    window.onload = loadStats;
</script>

</body>
</html>
